}

function matModal(id){
  const m=id?mats.find(x=>x.id===id):{};
  show(`
    <div class="mh"><div class="mt">${id?'Редагувати':'Новий матеріал'}</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
    <div class="field"><label>Назва</label><input class="fi" id="mn" value="${m?.name||''}" placeholder="Фарба Wella 8/0"/></div>
    <div class="field"><label>Категорія</label><select class="fi" id="mcat">${CATS.map(c=>`<option ${m?.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="g2">
      <div class="field"><label>К-сть (шт)</label><input type="number" class="fi" id="mq" value="${m?.qty||0}" step="0.5"/></div>
      <div class="field"><label>Мін. запас (шт)</label><input type="number" class="fi" id="mm" value="${m?.minQty||1}"/></div>
    </div>
    <div class="field"><label>Одиниця списання</label><select class="fi" id="msu">
      <option value="шт" ${(!m?.spendUnit||m?.spendUnit==='шт')?'selected':''}>шт</option>
      <option value="г" ${m?.spendUnit==='г'?'selected':''}>г (грами)</option>
      <option value="мл" ${m?.spendUnit==='мл'?'selected':''}>мл</option>
    </select></div>
    <div id="vpkg" style="${m?.spendUnit&&m?.spendUnit!=='шт'?'':'display:none'}">
      <div class="field"><label id="vlbl">Об'єм упаковки (г в 1 шт)</label><input type="number" class="fi" id="mvol" value="${m?.volPerUnit||0}" placeholder="60"/></div>
      <div class="field"><label>Тара (вага порожньої упаковки, г)</label><input type="number" class="fi" id="mtare" value="${m?.tare||0}" placeholder="0"/></div>
      <div style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:13px">
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Якщо зважили нову упаковку разом із тарою (а не брали вагу з етикетки) — впишіть цю загальну вагу тут, і поле «Об'єм упаковки» вище порахується автоматично.</div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <div style="flex:1"><div style="font-size:10px;color:var(--mut);margin-bottom:3px">Загальна вага з тарою (г)</div>
            <input type="number" class="fi" id="mgrossw" placeholder="0"/></div>
          <button type="button" class="btn bg bs" id="mgrosscalc" style="white-space:nowrap">Порахувати</button>
        </div>
      </div>
    </div>
    <div class="field"><label>Ціна за упаковку (грн/шт)</label><input type="number" step="0.01" class="fi" id="mp" value="${m?.price?Number(m.price.toFixed(2)):0}"/></div>
    <div id="mcalc" style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:13px;${m?.spendUnit&&m?.spendUnit!=='шт'&&m?.volPerUnit>0?'':'display:none'}">
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--mut)">Ціна за г/мл:</span><span id="mpg" style="font-weight:700;color:var(--acs)">${m?.pricePerUnit?m.pricePerUnit.toFixed(2)+' грн':'—'}</span></div>
    </div>
    <div class="mf"><button class="btn bg" id="mc">Скасувати</button><button class="btn bp" id="ms">Зберегти</button></div>`);
  const upd=()=>{
    const su=$('msu').value,vol=+($('mvol')?.value||0),p=+$('mp').value;
    $('vpkg').style.display=su!=='шт'?'':'none';

    if(su!=='шт'&&vol>0&&p>0){$('mcalc').style.display='';$('mpg').textContent=(p/vol).toFixed(2)+' грн/'+su;}
    else $('mcalc').style.display='none';
  };
  $('msu').onchange=upd;$('mvol')&&$('mvol').addEventListener('input',upd);$('mp').addEventListener('input',upd);
  $('mgrosscalc')&&($('mgrosscalc').onclick=()=>{
    const gross=+$('mgrossw').value||0,tare=+$('mtare').value||0;
    if(gross<=0){alert('Введіть загальну вагу');return;}
    const net=Math.max(0,gross-tare);
    $('mvol').value=net.toFixed(2);
    upd();
  });
  $('mx').onclick=hide;$('mc').onclick=hide;
  $('ms').onclick=async()=>{
    const name=$('mn').value,su=$('msu').value,vol=+($('mvol')?.value||0),tare=+($('mtare')?.value||0),price=+$('mp').value,qty=+$('mq').value;
    if(!name){alert('Введіть назву');return;}
    if(!id){const dup=mats.find(x=>x.name.toLowerCase()===name.toLowerCase());if(dup){alert('Товар "'+name+'" вже існує!');return;}}
    const ppu=su!=='шт'&&vol>0?price/vol:0;
    const data={name,category:$('mcat').value,qty,minQty:+$('mm').value,price,avgPrice:price,spendUnit:su,volPerUnit:vol,tare,pricePerUnit:ppu,avgPricePerUnit:ppu};
    if(id)await updateDoc(doc(db,'materials',id),data);else await addDoc(collection(db,'materials'),data);

function spendModal(id){
  const m=mats.find(x=>x.id===id);
  const byG=m.spendUnit&&m.spendUnit!=='шт'&&m.volPerUnit>0;
  const totalU=byG?m.qty*m.volPerUnit:m.qty,ppu=m.avgPricePerUnit||m.pricePerUnit||0,unit=byG?m.spendUnit:'шт';
  show(`
    <div class="mh"><div class="mt">Списати: ${m.name}</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
    <div style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="color:var(--mut)">В наявності:</span><span style="font-weight:700;color:var(--acs)">${fmt(totalU)} ${unit} (${m.qty} шт)</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--mut)">Ціна за ${unit}:</span><span style="font-weight:700;color:var(--sil)">${(byG?ppu:m.avgPrice||m.price||0).toFixed(2)} грн</span></div>
    </div>
    <div class="field"><label>Кількість (${unit})</label><input type="number" class="fi" id="sqa" step="0.1" placeholder="0"/></div>
    <div id="scalc" style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:13px;display:none">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--mut)">Вартість:</span><span id="scost" style="font-weight:700;color:var(--err)"></span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--mut)">Залишок:</span><span id="srem" style="font-weight:700;color:var(--acs)"></span></div>
    </div>
    <div class="field"><label>Дата</label><input type="date" class="fi" id="sdate" value="${today()}"/></div>
    <div class="field"><label>Примітка</label><input class="fi" id="snote" placeholder="Клієнт..."/></div>
    <div class="mf"><button class="btn bg" id="mc">Скасувати</button><button class="btn bp" id="ms">Списати</button></div>`);
  $('mx').onclick=hide;$('mc').onclick=hide;
  $('sqa').addEventListener('input',e=>{
    const q=+e.target.value||0;
    if(q>0){const cost=byG?q*ppu:q*(m.avgPrice||m.price||0),remU=totalU-q;$('scalc').style.display='';$('scost').textContent=cost.toFixed(2)+' грн';const remShts=byG?remU/m.volPerUnit:remU;$('srem').textContent=remU.toFixed(1)+' '+unit+' ('+remShts.toFixed(2)+' шт)';$('srem').style.color=remU<0?'var(--err)':'var(--acs)';}
    else $('scalc').style.display='none';
  });
  $('ms').onclick=async()=>{
    const q=+$('sqa').value;if(!q){alert('Введіть кількість');return;}
    // No floor at 0 here either — same reasoning as appointment write-offs:
    // spending ahead of a receive should show up as a temporary shortfall
    // that a later "Прихід" corrects, not a deduction that just vanishes.
    const newQty=byG?(totalU-q)/m.volPerUnit:m.qty-q;
    const total=byG?q*ppu:q*(m.avgPrice||m.price||0);
    await updateDoc(doc(db,'materials',id),{qty:+newQty.toFixed(4)});
    await addDoc(collection(db,'purchases'),{matId:id,matName:m.name,type:'spend',qty:q,unit,total,date:$('sdate').value,note:$('snote').value});
    hide();
  };
}

function historyModal(){
  function render(){
    const q=(histQ||'').toLowerCase();
    // Receive-type purchases are grouped back into one "накладна" card per
    // batchId (everything entered together in one receiveModal session) —
    // legacy entries saved before batchId existed fall back to one card per
    // document, so nothing old disappears. Spend entries stay individual,
    // since each one is tied to a specific piece of work, not an invoice.
    const receiveOps=ops.filter(o=>o.type==='receive');
    const spendOps=ops.filter(o=>o.type==='spend');
    const batches={};
    receiveOps.forEach(o=>{
      const key=o.batchId||('legacy-'+o.id);
      if(!batches[key])batches[key]={key,date:o.date,note:o.note,items:[]};
      batches[key].items.push(o);
      if(o.date>batches[key].date)batches[key].date=o.date;
    });
    let entries=[];
    if(histType==='Всі'||histType==='Прихід'){
      Object.values(batches).forEach(b=>{
        const matches=!q||(b.note||'').toLowerCase().includes(q)||b.items.some(it=>(it.matName||'').toLowerCase().includes(q));
        if(matches)entries.push({kind:'receive',date:b.date,batch:b});
      });
    }
    if(histType==='Всі'||histType==='Витрата'){
      spendOps.forEach(o=>{
        if(!q||(o.matName||'').toLowerCase().includes(q))entries.push({kind:'spend',date:o.date,op:o});
      });
    }
    entries.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    let lastDate=null,rows='';
    for(const e of entries){
      if(e.date!==lastDate){
        lastDate=e.date;
        rows+=`<div style="font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;margin:14px 0 6px">${fmtL(e.date)}</div>`;
      }
      if(e.kind==='receive'){
        const b=e.batch,total=b.items.reduce((s,it)=>s+(it.total||0),0);
        rows+=`<div style="border:1px solid var(--brd);border-radius:10px;padding:10px 12px;margin-bottom:10px;background:var(--card)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div><div style="font-size:11px;font-weight:700;color:var(--ok)">📦 Прихід${b.note?' · '+b.note:''}</div>
            <div style="font-size:11px;color:var(--mut)">${b.items.length} поз.</div></div>
            <div style="text-align:right">
              <div style="font-weight:700;font-size:14px;color:var(--sil)">${fmt(total)} грн</div>
              <button class="bi bs" style="margin-top:4px" data-delbatch="${b.key}">${svg(ic.del,12,'var(--err)')}</button>
            </div>
          </div>
          ${b.items.map(it=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid var(--brd);font-size:12px">
            <span>${it.matName||'?'} · ${it.qty} ${it.unit||'шт'}${it.disc?' -'+it.disc+'%':''}</span>
            <span style="color:var(--mut)">${fmt(it.total)} грн</span>
          </div>`).join('')}
        </div>`;
      } else {
        const o=e.op;
        rows+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)">
          <div style="flex:1"><div style="font-size:11px;font-weight:700;color:var(--err)">📉 Витрата</div>
            <div style="font-size:13px;margin:2px 0">${o.matName||'?'}</div>
            <div style="font-size:11px;color:var(--mut)">${o.qty} ${o.unit||'шт'}${o.disc?' · -'+o.disc+'%':''}</div>
            ${o.note?`<div style="font-size:11px;color:var(--dim)">${o.note}</div>`:''}
          </div>
          <div style="text-align:right"><div style="font-weight:700;font-size:13px;color:var(--sil)">${fmt(o.total)} грн</div>
            <button class="bi bs" style="margin-top:4px" data-oid="${o.id}" data-omid="${o.matId}" data-otype="${o.type}" data-oqty="${o.qty}" data-obackfilled="${o.backfilled?1:0}">${svg(ic.x,12,'var(--err)')}</button>
          </div>
        </div>`;
      }
    }
    const pendingBackfill=appts.filter(a=>Array.isArray(a.materialsUsed)&&a.materialsUsed.length>0&&a.status!=='cancelled'&&!a.materialsHistoryBackfilled);
    $('modal').innerHTML=`
      <div class="mh"><div class="mt">Історія операцій</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
      <div class="chips">${['Всі','Прихід','Витрата'].map(t=>`<button class="chip ${histType===t?'on':''}" data-ht="${t}">${t}</button>`).join('')}</div>
      ${pendingBackfill.length?`<button class="btn bg bs" id="hbackfill" style="margin-bottom:10px;width:100%;justify-content:center">🔄 Підтягнути старі списання з записів (${pendingBackfill.length})</button>`:''}
      <input class="fi" id="hq" style="margin-bottom:10px" placeholder="🔍 Пошук за назвою чи постачальником..." value="${histQ}"/>
      ${entries.length===0?'<div class="empty">Нічого не знайдено</div>':rows}`;
    $('mx').onclick=hide;
    if($('hbackfill'))$('hbackfill').onclick=async()=>{
      if(backfillRunning)return; // guards against a double-tap firing this twice, which is what caused duplicates
      if(!confirm(`Додати в Історію ${pendingBackfill.length} старих запис(ів) списання матеріалів з карток клієнтів? Це НЕ вплине на поточні залишки — лише додасть записи в історію.`))return;
      backfillRunning=true;
      $('hbackfill').disabled=true;$('hbackfill').style.opacity='.5';
      let count=0;
      for(const a of pendingBackfill){
        for(const mu of a.materialsUsed){
          const m=mats.find(x=>x.id===mu.matId);if(!m||!mu.qty)continue;
          const{unit,ppu}=matUnitInfo(m);
          await addDoc(collection(db,'purchases'),{matId:mu.matId,matName:m.name,type:'spend',qty:mu.qty,unit,total:mu.qty*ppu,date:a.date,note:a.client,apptId:a.id,backfilled:true});
          count++;
        }
        await updateDoc(doc(db,'appointments',a.id),{materialsHistoryBackfilled:true});
      }
      backfillRunning=false;
      alert(`Додано ${count} записів в історію.`);
      render();
    };
    $('modal').querySelectorAll('[data-ht]').forEach(b=>b.onclick=()=>{histType=b.dataset.ht;render();});
    $('hq').addEventListener('input',e=>{
      histQ=e.target.value;render();
      setTimeout(()=>{const el2=$('hq');if(el2){el2.focus();el2.setSelectionRange(el2.value.length,el2.value.length);}},10);
    });
    $('modal').querySelectorAll('[data-oid]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Скасувати?'))return;
      // Backfilled entries were created purely as historical documentation
      // of a spend that already happened long ago — they never touched
      // stock themselves, so deleting one must NOT add stock back (that
      // would incorrectly inflate the current balance).
      if(b.dataset.obackfilled!=='1'){
        const m=mats.find(x=>x.id===b.dataset.omid);
        if(m){const q2=+b.dataset.oqty,nq=b.dataset.otype==='receive'?m.qty-q2:m.qty+q2;await updateDoc(doc(db,'materials',b.dataset.omid),{qty:+nq.toFixed(4)});}
      }
      await deleteDoc(doc(db,'purchases',b.dataset.oid));hide();
    });
    $('modal').querySelectorAll('[data-delbatch]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Скасувати всю накладну? Це поверне залишки по всіх позиціях у ній.'))return;
      const batch=batches[b.dataset.delbatch];
      for(const it of batch.items){
        const m=mats.find(x=>x.id===it.matId);
        if(m){const nq=m.qty-(it.qty||0);await updateDoc(doc(db,'materials',it.matId),{qty:+nq.toFixed(4)});}
        await deleteDoc(doc(db,'purchases',it.id));
      }
      hide();
    });
  }
  show("");render();
}

function svcModal(id){
  const s=id?svcs.find(x=>x.id===id):{};
  const dur=s?.duration||60,hh=Math.floor(dur/60),mm=dur%60;
  // The service's standard "recipe" — materials + quantities that get
  // auto-added to every appointment that includes this service, so shampoo/
  // conditioner etc. don't need to be typed in by hand each visit but still
  // count toward that service's material cost and margin.
  let selMats=(s&&Array.isArray(s.defaultMaterials))?s.defaultMaterials.map(m=>({matId:m.matId,qty:m.qty})):[];
  let matSearchQ='';
  const matListSorted=[...mats].sort((x,y)=>x.name.localeCompare(y.name));
  const renderPickList=q=>{
    const ql=(q||'').toLowerCase();
    const filtered=matListSorted.filter(m=>!ql||m.name.toLowerCase().includes(ql));
    return filtered.length?filtered.map(m=>{
      const{unit}=matUnitInfo(m);
      return`<div style="padding:9px 12px;border-bottom:1px solid var(--brd);cursor:pointer;display:flex;justify-content:space-between" data-pickmat="${m.id}">
        <span style="font-size:13px">${m.name}</span><span style="font-size:11px;color:var(--mut)">${unit}</span>
      </div>`;
    }).join(''):'<div style="padding:12px;color:var(--dim);text-align:center;font-size:12px">Нічого не знайдено</div>';
  };
  function render(){
    const matRows=selMats.map((sm,i)=>{
      const m=mats.find(x=>x.id===sm.matId);
      const{unit,ppu}=m?matUnitInfo(m):{unit:'шт',ppu:0};
      const cost=(sm.qty||0)*ppu;
      return`<div style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-size:13px;font-weight:600">${m?.name||'?'}</div>
          <button class="bi bs" data-rmmat="${i}">${svg(ic.x,12,'var(--err)')}</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1">
            <div style="font-size:10px;color:var(--mut);margin-bottom:3px">Кількість (${unit}) на 1 послугу</div>
            <input type="number" step="0.1" value="${sm.qty||0}" style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px 8px;color:var(--txt);font-size:13px;outline:none" data-matqty="${i}" placeholder="0"/>
          </div>
          <div style="text-align:right;min-width:70px">
            <div style="font-size:10px;color:var(--mut)">Вартість</div>
            <div style="font-size:14px;font-weight:700;color:var(--sil)" data-matcost="${i}">${cost.toFixed(2)} грн</div>
          </div>
        </div>
      </div>`;
    }).join('');
    const totalMatCost=selMats.reduce((s2,sm)=>{const m=mats.find(x=>x.id===sm.matId);return s2+(sm.qty||0)*matUnitInfo(m).ppu;},0);
    $('modal').innerHTML=`
      <div class="mh"><div class="mt">${id?'Редагувати':'Нова послуга'}</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
      <div class="field"><label>Назва</label><input class="fi" id="sn" value="${s?.name||''}" placeholder="Стрижка, Фарбування..."/></div>
      <div class="field"><label>Ціна (грн)</label><input type="number" class="fi" id="sp" value="${s?.price||0}"/></div>
      <div class="field"><label>Тривалість</label>
        <div class="g2">
          <select class="fi" id="sdh">${Array.from({length:9},(_,i)=>`<option value="${i}" ${hh===i?'selected':''}>${i} год</option>`).join('')}</select>
          <select class="fi" id="sdm">${[0,15,30,45].map(m=>`<option value="${m}" ${mm===m?'selected':''}>${m} хв</option>`).join('')}</select>
        </div>
      </div>
      <div class="field"><label>Стандартні матеріали на послугу ${selMats.length>0?`<span style="color:var(--acc);font-weight:700">${selMats.length} · ${totalMatCost.toFixed(2)} грн</span>`:''}</label>
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Автоматично додаватимуться в кожен новий запис із цією послугою — вписувати шампунь/кондиціонер вручну щоразу не треба. Кількість можна буде підкоригувати прямо в записі.</div>
        ${matRows}
        <input class="fi" id="smsearch" style="margin-top:8px" placeholder="🔍 Пошук матеріалу..." value="${matSearchQ}"/>
        <div id="matPickList" style="max-height:160px;overflow-y:auto;border:1px solid var(--brd);border-radius:8px;margin-top:6px">${renderPickList(matSearchQ)}</div>
      </div>
      <div class="mf"><button class="btn bg" id="mc">Скасувати</button><button class="btn bp" id="ms">Зберегти</button></div>`;
    $('mx').onclick=hide;$('mc').onclick=hide;
    const capture=()=>{
      $('modal').querySelectorAll('[data-matqty]').forEach(inp=>{if(selMats[+inp.dataset.matqty])selMats[+inp.dataset.matqty].qty=+inp.value||0;});
      if($('smsearch'))matSearchQ=$('smsearch').value;
    };
    const bindPick=()=>{
      $('modal').querySelectorAll('[data-pickmat]').forEach(el2=>{
        el2.onclick=()=>{
          capture();
          selMats.push({matId:el2.dataset.pickmat,qty:0});
          matSearchQ='';
          render();
        };
      });
    };
    bindPick();
    $('smsearch').addEventListener('input',e=>{
      $('matPickList').innerHTML=renderPickList(e.target.value);
      bindPick();
    });
    $('modal').querySelectorAll('[data-rmmat]').forEach(b=>b.onclick=()=>{
      capture();
      selMats.splice(+b.dataset.rmmat,1);
      render();
    });
    $('modal').querySelectorAll('[data-matqty]').forEach(inp=>inp.addEventListener('input',e=>{
      const idx=+inp.dataset.matqty;
      selMats[idx].qty=+e.target.value||0;
      const m=mats.find(x=>x.id===selMats[idx].matId);
      const costEl=$('modal').querySelector(`[data-matcost="${idx}"]`);
      if(costEl)costEl.textContent=(selMats[idx].qty*matUnitInfo(m).ppu).toFixed(2)+' грн';
    }));
    $('ms').onclick=async()=>{
      capture();
      const d={name:$('sn').value,price:+$('sp').value,duration:+$('sdh').value*60 + +$('sdm').value,
        defaultMaterials:selMats.filter(sm=>sm.matId&&sm.qty>0).map(sm=>({matId:sm.matId,qty:sm.qty}))};
      if(!d.name||!d.price){alert('Заповніть поля');return;}
      if(id)await updateDoc(doc(db,'services',id),d);else await addDoc(collection(db,'services'),d);
      hide();
    };
  }
  render();
}

function drawStats(){
  const el=$('t-stats'),now2=new Date();
  // Default the custom range to today the first time it's needed, without
  // touching the module-load-time state (today() isn't defined yet at that
  // point in the file, so this has to happen lazily, at render time).
  if(!periodFrom)periodFrom=today();
  if(!periodTo)periodTo=today();
  // Single shared predicate for "is this date inside the selected period" —
  // used for appointments, purchases, and other expenses alike, so День /
  // Тиждень / Місяць / Рік / Період (довільний діапазон) all behave
  // consistently everywhere in this tab.
  const inSelPeriod=dateStr=>{
    if(!dateStr)return false;
    const d=new Date(dateStr+'T12:00:00');
    if(period==='day')return dateStr===today();
    if(period==='week'){const w=new Date(now2);w.setDate(now2.getDate()-7);return d>=w;}
    if(period==='month')return d.getMonth()===now2.getMonth()&&d.getFullYear()===now2.getFullYear();
    if(period==='year')return d.getFullYear()===now2.getFullYear();
    if(period==='custom')return dateStr>=periodFrom&&dateStr<=periodTo;
    return true;
  };
  const done=appts.filter(a=>a.status==='done'&&inSelPeriod(a.date));
  const recOps=ops.filter(o=>o.type==='receive'&&inSelPeriod(o.date));
  const otherExps=exps.filter(o=>inSelPeriod(o.date));
  const rev=done.reduce((s,a)=>s+(a.paid||apptTotalPrice(a)),0);
  const exp=recOps.reduce((s,o)=>s+(o.total||0),0),profit=rev-exp,avg=done.length?rev/done.length:0;
  // Собівартість матеріалів, реально списаних під виконані записи (точний
  // варіант — сума materialCost, збереженого на кожному запису), і маржа
  // (виручка мінус ці матеріали), окремо від "Витрат"/"Прибутку" вище, які
  // рахуються по надходженнях на склад за період.
  const matCostTotal=done.reduce((s,a)=>s+(a.materialCost||0),0);
  const svcMargin=rev-matCostTotal, svcMarginPct=rev>0?(svcMargin/rev*100):0;
  // Інші (нематеріальні) витрати за період — оренда, податки, подарунки
  // тощо, введені у вкладці «Витрати». Чистий прибуток — це те, що
  // фактично залишається після собівартості матеріалів І цих витрат.
  const otherExpTotal=otherExps.reduce((s,o)=>s+(o.amount||0),0);
  // Чайові — окремі від "Виручки" (яка відображає ціну послуг), але це
  // реальні гроші в кишені, тож враховуються в "Чистому прибутку".
  const tipsTotal=done.reduce((s,a)=>s+(a.tips||0),0);
  const netProfit=svcMargin-otherExpTotal+tipsTotal;
  // Прив'язка йде по "головній" послузі запису (a.serviceId), як і раніше —
  // для записів з кількома послугами вся собівартість матеріалів і час
  // запису відносяться на першу/головну послугу (той самий спрощений підхід,
  // що вже використовувався для виручки та графіка по днях тижня).
  const bySvc=svcs.map(sv=>{
    const apptsForSvc=done.filter(a=>a.serviceId===sv.id);
    const cnt=apptsForSvc.length;
    const rev=apptsForSvc.reduce((s,a)=>s+(a.paid||apptTotalPrice(a)),0);
    const matCost=apptsForSvc.reduce((s,a)=>s+(a.materialCost||0),0);
    const margin=rev-matCost;
    const marginPct=rev>0?(margin/rev*100):0;
    const totalMins=apptsForSvc.reduce((s,a)=>s+apptDuration(a),0);
    const marginPerHour=totalMins>0?margin/(totalMins/60):0;
    return{...sv,cnt,rev,matCost,margin,marginPct,marginPerHour};
  }).filter(s=>s.cnt>0).sort((a,b)=>b.rev-a.rev);
  const maxS=Math.max(...bySvc.map(s=>s.rev),1);
  const byDay=['Пн','Вт','Ср','Чт','Пт','Сб','Нд'].map((l,i)=>{const dn=(i+1)%7,r=done.filter(a=>new Date(a.date+'T12:00:00').getDay()===dn).reduce((s,a)=>s+(a.paid||apptTotalPrice(a)),0);return{l,r};});
  const maxD=Math.max(...byDay.map(d=>d.r),1);
  el.innerHTML=`
    <div class="chips">${[['day','День'],['week','Тиждень'],['month','Місяць'],['year','Рік'],['custom','Період']].map(([k,l])=>`<button class="chip ${period===k?'on':''}" data-p="${k}">${l}</button>`).join('')}</div>
    ${period==='custom'?`<div class="g2" style="margin-bottom:12px">
      <div class="field" style="margin-bottom:0"><label>Від</label><input type="date" class="fi" id="pdfrom" value="${periodFrom}"/></div>
      <div class="field" style="margin-bottom:0"><label>До</label><input type="date" class="fi" id="pdto" value="${periodTo}"/></div>
    </div>`:''}
    <div class="sg">
      <div class="sc" id="cardRev" style="cursor:pointer"><div class="sv" style="color:var(--sil)">${fmt(rev)} грн</div><div class="sl">Виручка</div><div style="color:var(--mut);font-size:11px">${done.length} послуг</div></div>
      <div class="sc" id="cardExp" style="cursor:pointer"><div class="sv" style="color:var(--err)">${fmt(exp)} грн</div><div class="sl">Витрати</div></div>
      <div class="sc"><div class="sv" style="color:${profit>=0?'var(--ok)':'var(--err)'}">${fmt(profit)} грн</div><div class="sl">Прибуток</div></div>
      <div class="sc"><div class="sv" style="color:var(--acs)">${fmt(avg)} грн</div><div class="sl">Сер. чек</div></div>
      <div class="sc" id="cardMatCost" style="cursor:pointer"><div class="sv" style="color:var(--wrn)">${fmt(matCostTotal)} грн</div><div class="sl">Собівартість матеріалів</div></div>
      <div class="sc"><div class="sv" style="color:${svcMargin>=0?'var(--ok)':'var(--err)'}">${fmt(svcMargin)} грн</div><div class="sl">Маржа (${svcMarginPct.toFixed(0)}%)</div></div>
      <div class="sc" id="cardOtherExp" style="cursor:pointer"><div class="sv" style="color:var(--err)">${fmt(otherExpTotal)} грн</div><div class="sl">Інші витрати</div></div>
      <div class="sc"><div class="sv" style="color:var(--ok)">${fmt(tipsTotal)} грн</div><div class="sl">Чайові</div></div>
      <div class="sc"><div class="sv" style="color:${netProfit>=0?'var(--ok)':'var(--err)'}">${fmt(netProfit)} грн</div><div class="sl">Чистий прибуток</div></div>
    </div>
    <div class="card"><div class="sec" style="margin-top:0">По днях тижня</div>
      <div style="display:flex;align-items:flex-end;gap:5px;height:80px">
        ${byDay.map(({l,r})=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
          <div style="font-size:9px;color:var(--dim)">${r>0?fmt(r/1000)+'к':''}</div>
          <div style="width:100%;background:${r>0?'linear-gradient(to top,#6B6380,#A89BC2)':'var(--brd)'};border-radius:3px 3px 0 0;height:${Math.max(r/maxD*65,r>0?3:2)}px"></div>
          <div style="font-size:10px;color:var(--mut)">${l}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card"><div class="sec" style="margin-top:0">Послуги</div>
      ${bySvc.length===0?'<div style="color:var(--dim);text-align:center;padding:20px 0">Немає даних</div>':bySvc.map(s=>`
        <div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--brd)">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px">${s.name} <span style="color:var(--dim)">×${s.cnt}</span></span>
            <span style="font-weight:700;color:var(--sil)">${fmt(s.rev)} грн</span>
          </div>
          <div class="pb"><div class="pf" style="width:${s.rev/maxS*100}%"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--mut)">
            <span>Матеріали: ${fmt(s.matCost)} грн</span>
            <span style="color:${s.margin>=0?'var(--ok)':'var(--err)'};font-weight:600">Маржа: ${fmt(s.margin)} грн (${s.marginPct.toFixed(0)}%)</span>
          </div>
          <div style="text-align:right;font-size:11px;color:var(--acs);margin-top:2px">≈ ${fmt(s.marginPerHour)} грн/год</div>
        </div>`).join('')}
    </div>
    <div class="card"><div class="sec" style="margin-top:0">Останні закупівлі</div>
      ${recOps.length===0?'<div style="color:var(--dim);text-align:center;padding:20px 0">Немає</div>':recOps.slice(-8).reverse().map(o=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd)">
          <div><div style="font-size:13px">${o.matName||'?'}</div><div style="font-size:11px;color:var(--mut)">${o.date} · ${o.qty} шт${o.disc?' · -'+o.disc+'%':''}</div></div>
          <div style="font-weight:700;color:var(--sil);white-space:nowrap">${fmt(o.total)} грн</div>
        </div>`).join('')}
    </div>
    <div class="card"><div class="sec" style="margin-top:0">Останні витрати</div>
      ${otherExps.length===0?'<div style="color:var(--dim);text-align:center;padding:20px 0">Немає</div>':otherExps.slice(0,8).map(o=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd)">
          <div><div style="font-size:13px">${o.name||o.category||'?'}</div><div style="font-size:11px;color:var(--mut)">${o.date} · ${o.category||''}</div></div>
          <div style="font-weight:700;color:var(--err);white-space:nowrap">${fmt(o.amount)} грн</div>
        </div>`).join('')}
    </div>`;
  el.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>{period=b.dataset.p;drawStats();});
  const pf=$('pdfrom'),pt=$('pdto');
  if(pf)pf.onchange=()=>{periodFrom=pf.value;drawStats();};
  if(pt)pt.onchange=()=>{periodTo=pt.value;drawStats();};
  // Tap-to-drill-down: each of these cards opens a modal listing exactly
  // which appointments/purchases/expenses make up that number for the
  // currently selected period, so the totals are auditable rather than
  // just trusted at face value.
  $('cardRev').onclick=()=>revenueDetailModal(done);
  $('cardExp').onclick=()=>purchasesDetailModal(recOps);
  $('cardMatCost').onclick=()=>materialsDetailModal(done);
  $('cardOtherExp').onclick=()=>expensesDetailModal(otherExps);
}

// Drill-down modals for the clickable Аналітика cards ───────────────────
function revenueDetailModal(list){
  const sorted=[...list].sort((a,b)=>((b.date||'')+(b.time||'')).localeCompare((a.date||'')+(a.time||'')));
  const total=sorted.reduce((s,a)=>s+(a.paid||apptTotalPrice(a)),0);
  const rows=sorted.map(a=>{
    const svcNames=a.services?a.services.map(s=>{const sid=typeof s==='object'?s.serviceId:s;return svcs.find(sv=>sv.id===sid)?.name||'';}).filter(Boolean).join('+'):(svcs.find(sv=>sv.id===a.serviceId)?.name||'');
    const amt=a.paid||apptTotalPrice(a);
    return`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--brd)">
      <div><div style="font-size:13px;font-weight:600">${a.client||'—'}</div><div style="font-size:11px;color:var(--mut)">${fmtS(a.date)} ${a.time||''} · ${svcNames}</div></div>
      <div style="font-weight:700;color:var(--sil);white-space:nowrap">${fmt(amt)} грн</div>
    </div>`;
  }).join('');
  show(`<div class="mh"><div class="mt">Виручка — деталізація</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
    <div style="text-align:right;font-weight:700;font-size:15px;color:var(--sil);margin-bottom:8px">Разом: ${fmt(total)} грн · ${sorted.length} записів</div>
    ${sorted.length===0?'<div class="empty">Немає записів за цей період</div>':rows}`);
  $('mx').onclick=hide;
}

function materialsDetailModal(list){
  const agg={};
  list.forEach(a=>(a.materialsUsed||[]).forEach(mu=>{
    if(!agg[mu.matId])agg[mu.matId]=0;
    agg[mu.matId]+=mu.qty||0;
  }));
  const rows=Object.entries(agg).map(([matId,qty])=>{
    const m=mats.find(x=>x.id===matId);
    const{unit,ppu}=m?matUnitInfo(m):{unit:'шт',ppu:0};
    return{name:m?.name||'?',qty,unit,cost:qty*ppu};
  }).sort((a,b)=>b.cost-a.cost);
  const total=rows.reduce((s,r)=>s+r.cost,0);
  const rowsHtml=rows.map(r=>`
    <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--brd)">
      <div><div style="font-size:13px;font-weight:600">${r.name}</div><div style="font-size:11px;color:var(--mut)">${fmt(r.qty)} ${r.unit}</div></div>
      <div style="font-weight:700;color:var(--wrn);white-space:nowrap">${fmt(r.cost)} грн</div>
    </div>`).join('');
  show(`<div class="mh"><div class="mt">Собівартість матеріалів — деталізація</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Порахована за поточними цінами матеріалів — може трохи відрізнятись від збереженої на момент запису, якщо ціни відтоді змінювались.</div>
    <div style="text-align:right;font-weight:700;font-size:15px;color:var(--sil);margin-bottom:8px">Разом: ${fmt(total)} грн</div>
    ${rows.length===0?'<div class="empty">Матеріали не використовувались</div>':rowsHtml}`);
  $('mx').onclick=hide;
}

function purchasesDetailModal(list){
  const sorted=[...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total=sorted.reduce((s,o)=>s+(o.total||0),0);
  const rows=sorted.map(o=>`
    <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--brd)">
      <div><div style="font-size:13px">${o.matName||'?'}</div><div style="font-size:11px;color:var(--mut)">${fmtS(o.date)} · ${o.qty} шт${o.disc?' · -'+o.disc+'%':''}</div></div>
      <div style="font-weight:700;color:var(--sil);white-space:nowrap">${fmt(o.total)} грн</div>
    </div>`).join('');
  show(`<div class="mh"><div class="mt">Витрати на закупівлі — деталізація</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
    <div style="text-align:right;font-weight:700;font-size:15px;color:var(--sil);margin-bottom:8px">Разом: ${fmt(total)} грн</div>
    ${sorted.length===0?'<div class="empty">Немає закупівель за цей період</div>':rows}`);
  $('mx').onclick=hide;
}

function expensesDetailModal(list){
  const sorted=[...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total=sorted.reduce((s,o)=>s+(o.amount||0),0);
  const rows=sorted.map(o=>`
    <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--brd)">
      <div><div style="font-size:13px">${o.name||o.category||'Витрата'}</div><div style="font-size:11px;color:var(--mut)">${fmtS(o.date)} · ${o.category||''}</div></div>
      <div style="font-weight:700;color:var(--err);white-space:nowrap">${fmt(o.amount)} грн</div>
    </div>`).join('');
  show(`<div class="mh"><div class="mt">Інші витрати — деталізація</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
    <div style="text-align:right;font-weight:700;font-size:15px;color:var(--sil);margin-bottom:8px">Разом: ${fmt(total)} грн</div>
    ${sorted.length===0?'<div class="empty">Немає витрат за цей період</div>':rows}`);
  $('mx').onclick=hide;
}

// ══════════════════════════════════════════════════
// EXPENSES (Витрати) — rent, taxes, gifts, and other non-material costs.
// Entered manually each time (no auto-recurring projection) so the person
// stays in control of exactly what was actually paid and when.
// ══════════════════════════════════════════════════
function drawExp(){
  const el=$('t-exp'),now=new Date();
  const inPeriod=o=>{
    const d=new Date(o.date+'T12:00:00');
    if(expPeriod==='week'){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
    if(expPeriod==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(expPeriod==='year')return d.getFullYear()===now.getFullYear();
    return true; // 'all'
  };
  const cats=getExpCats();
  const fil=exps.filter(o=>inPeriod(o)&&(expCat==='Всі'||o.category===expCat));
  const total=fil.reduce((s,o)=>s+(o.amount||0),0);
  el.innerHTML=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn bp bs" id="beadd">${svg(ic.plus,14)} Витрата</button>
    </div>
    <div class="chips">${[['week','Тиждень'],['month','Місяць'],['year','Рік'],['all','Увесь час']].map(([k,l])=>`<button class="chip ${expPeriod===k?'on':''}" data-ep="${k}">${l}</button>`).join('')}</div>
    <div class="card" style="text-align:center;margin-bottom:12px">
      <div class="sv" style="color:var(--err)">${fmt(total)} грн</div>
      <div class="sl">Разом${expCat==='Всі'?'':' · '+expCat}</div>
    </div>
    <div class="chips">${['Всі',...cats].map(c=>`<button class="chip ${expCat===c?'on':''}" data-ec="${c}">${c}</button>`).join('')}</div>
    ${fil.length===0?'<div class="empty">Витрат немає</div>':fil.map(o=>`
      <div class="ri">
        <div class="rl"><div class="rn">${o.name||o.category||'Витрата'}</div><div class="rs">${o.category||''} · ${o.date}${o.note?' · '+o.note:''}</div></div>
        <div class="rr"><div class="rv" style="color:var(--err)">${fmt(o.amount)} грн</div></div>
        <div class="rac">
          <button class="bi bs" data-ee="${o.id}">${svg(ic.edit,13)}</button>
          <button class="bi bs" data-ed="${o.id}">${svg(ic.del,13,'var(--err)')}</button>
        </div>
      </div>`).join('')}`;
  $('beadd').onclick=()=>expModal(null);
  el.querySelectorAll('[data-ep]').forEach(b=>b.onclick=()=>{expPeriod=b.dataset.ep;drawExp();});
  el.querySelectorAll('[data-ec]').forEach(b=>b.onclick=()=>{expCat=b.dataset.ec;drawExp();});
  el.querySelectorAll('[data-ee]').forEach(b=>b.onclick=()=>expModal(b.dataset.ee));
  el.querySelectorAll('[data-ed]').forEach(b=>b.onclick=async()=>{if(confirm('Видалити?'))await deleteDoc(doc(db,'expenses',b.dataset.ed));});
}

function expModal(id){
  const o=id?exps.find(x=>x.id===id):null;
  let selCat=o?.category||null;
  function render(){
    const cats=getExpCats();
    if(!selCat||!cats.includes(selCat))selCat=cats[0];
    $('modal').innerHTML=`
      <div class="mh"><div class="mt">${id?'Редагувати витрату':'Нова витрата'}</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
      <div class="field"><label>Назва</label><input class="fi" id="en" value="${o?.name||''}" placeholder="Оренда за липень, Податок ЄП..."/></div>
      <div class="field"><label>Категорія</label><select class="fi" id="ecat">
        ${cats.map(c=>`<option value="${c}" ${selCat===c?'selected':''}>${c}</option>`).join('')}
        <option value="__new__">+ Нова категорія...</option>
      </select></div>
      <div class="field"><label>Сума (грн)</label><input type="number" class="fi" id="eam" value="${o?.amount||0}"/></div>
      <div class="field"><label>Дата</label><input type="date" class="fi" id="edate" value="${o?.date||today()}"/></div>
      <div class="field"><label>Примітка</label><textarea class="fi" id="enote">${o?.note||''}</textarea></div>
      <div class="mf">
        ${id?`<button class="btn bd bs" id="edel">Видалити</button>`:''}
        <button class="btn bg" id="ecancel">Скасувати</button>
        <button class="btn bp" id="esave">Зберегти</button>
      </div>`;
    $('mx').onclick=hide;$('ecancel').onclick=hide;
    $('ecat').onchange=e=>{
      if(e.target.value==='__new__'){
        const name=(prompt('Назва нової категорії:')||'').trim();
        if(name&&!BASE_EXP_CATS.includes(name)&&!customExpCats.includes(name)){
          customExpCats.push(name);
          localStorage.setItem('expCats',JSON.stringify(customExpCats));
        }
        selCat=name||selCat;
        render();
      } else {
        selCat=e.target.value;
      }
    };
    $('esave').onclick=async()=>{
      const name=$('en').value.trim();
      const amount=+$('eam').value||0;
      if(!name||!amount){alert('Заповніть назву і суму');return;}
      const data={name,category:selCat,amount,date:$('edate').value,note:$('enote').value};
      if(id)await updateDoc(doc(db,'expenses',id),data);
      else await addDoc(collection(db,'expenses'),data);
      hide();
    };
    if(id)$('edel').onclick=async()=>{if(confirm('Видалити?')){await deleteDoc(doc(db,'expenses',id));hide();}};
  }
  show('');render();
}

draw();
setInterval(()=>{ if(tab==='cal') drawCal(); }, 60000);
</script>
