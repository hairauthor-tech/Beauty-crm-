<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Beauty CRM</title>
<style>
:root{--bg:#111214;--surf:#18191C;--card:#1E2024;--brd:#2C2F35;--txt:#ECEEF2;--mut:#848A96;--dim:#4E5460;--acc:#A89BC2;--acs:#C4BAD8;--sil:#C8CDD6;--ok:#7BAF8A;--err:#B87070;--wrn:#C4A46A;}
.light{--bg:#F2F2F7;--surf:#FFFFFF;--card:#FFFFFF;--brd:#E0E0E5;--txt:#1A1A1E;--mut:#6B6B70;--dim:#AEAEB2;--acc:#7B6FA0;--acs:#9B8FC0;--sil:#3A3A3C;--ok:#3A8A50;--err:#C0392B;--wrn:#B8860B;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;overflow-x:hidden;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{display:none;}
.hdr{background:var(--surf);border-bottom:1px solid var(--brd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{background:linear-gradient(135deg,#6B6380,#A89BC2);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.content{padding:16px;padding-bottom:80px;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--brd);display:flex;z-index:50;}
.nb{flex:1;background:none;border:none;cursor:pointer;padding:10px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);font-size:10px;font-weight:500;}
.nb.on{color:var(--acs);}
.nb svg{width:20px;height:20px;}
.card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.btn{padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;border:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.bp{background:var(--acc);color:#fff;}
.bg{background:transparent;border:1px solid var(--brd);color:var(--mut);}
.bd{background:var(--err);color:#fff;}
.bs{padding:6px 11px;font-size:12px;}
.bi{padding:6px 8px;background:transparent;border:1px solid var(--brd);border-radius:7px;cursor:pointer;color:var(--mut);display:inline-flex;align-items:center;}
.field{margin-bottom:13px;}
.field label{display:block;color:var(--mut);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.fi{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:14px;outline:none;}
.fi::placeholder{color:var(--dim);}
textarea.fi{resize:vertical;min-height:58px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-start;padding-top:60px;}
.overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--brd);border-radius:16px;width:calc(100% - 32px);margin:0 auto;max-height:calc(100vh - 80px);overflow-y:auto;padding:20px 16px 30px;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mt{font-size:16px;font-weight:700;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.chips{display:flex;gap:5px;overflow-x:auto;margin-bottom:12px;}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--mut);white-space:nowrap;flex-shrink:0;}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.sec{color:var(--mut);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin:16px 0 8px;}
.ri{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:8px;}
.rl{flex:1;min-width:0;}
.rn{font-weight:600;font-size:14px;}
.rs{font-size:12px;color:var(--mut);margin-top:2px;}
.rr{text-align:right;flex-shrink:0;}
.rv{font-weight:700;font-size:15px;color:var(--sil);}
.ra{font-size:11px;color:var(--dim);}
.rac{display:flex;gap:5px;flex-shrink:0;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px;text-align:center;}
.sv{font-weight:800;font-size:20px;margin-bottom:3px;}
.pb{background:var(--brd);border-radius:4px;height:5px;overflow:hidden;margin-top:5px;}
.pf{height:100%;border-radius:4px;background:linear-gradient(to right,#6B6380,#C4BAD8);}
.empty{text-align:center;color:var(--dim);padding:50px 0;font-size:14px;}
.tab{display:none;}
.tab.on{display:block;}
input[type=date],input[type=time]{color-scheme:dark;}
.light input[type=date],.light input[type=time]{color-scheme:light;}
/* Calendar */
.CHR{height:28px;display:flex;align-items:center;padding-left:2px;}
.TL{height:60px;display:flex;flex-direction:column;justify-content:space-between;padding:2px 6px 0 0;color:var(--dim);font-size:10px;}
.TL-half{font-size:9px;color:var(--dim);opacity:.5;text-align:right}
.CAL-COL{flex:1;min-width:80px;border-left:1px solid var(--brd);}
.COL-H{height:28px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--mut);border-bottom:1px solid var(--brd);background:var(--surf);gap:4px;}
.COL-H.tod{color:var(--acc);}
.TC{position:absolute;cursor:pointer;}
.AB{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 5px;overflow:hidden;z-index:2;cursor:pointer;touch-action:none;transition:opacity .15s;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.AB.pending{background:rgba(168,155,194,.2);border-left:3px solid var(--acc);}
.AB.done{background:rgba(123,175,138,.15);border-left:3px solid var(--ok);}
.AB.cancelled{background:rgba(184,112,112,.15);border-left:3px solid var(--err);}
.AB.brk{background:repeating-linear-gradient(45deg,rgba(132,138,150,.14),rgba(132,138,150,.14) 6px,rgba(132,138,150,.26) 6px,rgba(132,138,150,.26) 12px);border-left:3px solid var(--dim);}
.AB-N{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.AB-T{font-size:9px;color:var(--mut);}
.AB-RES{position:absolute;bottom:0;left:0;right:0;height:12px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;}
.vb{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--mut);}
.vb.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.now-line{position:absolute;left:0;right:0;height:2px;background:#1A1A1E;z-index:5;pointer-events:none;}
.now-dot{position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#1A1A1E;}
.now-label{position:absolute;left:-44px;top:-9px;width:40px;text-align:right;font-size:9px;font-weight:700;color:#fff;background:#1A1A1E;border-radius:4px;padding:2px 4px;white-space:nowrap;}
.alert{border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;}
.alert-d{background:rgba(184,112,112,.1);border:1px solid rgba(184,112,112,.4);color:var(--err);}
.alert-conn{background:rgba(196,164,106,.12);border:1px solid rgba(196,164,106,.4);color:var(--wrn);position:sticky;top:0;z-index:60;justify-content:center;}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3a3 3 0 110 6 3 3 0 010-6zM18 3a3 3 0 110 6 3 3 0 010-6zM8.22 8.22l7.56 7.56M16.73 14.27l1.5 1.5a3 3 0 11-4.24 4.24l-1.5-1.5M7.27 9.73L5.77 8.23A3 3 0 111.53 4"/></svg></div>
    <div><div style="font-weight:800;font-size:14px">Beauty CRM</div><div style="font-size:10px;color:var(--dim)" id="hdate"></div></div>
  </div>
  <button class="bi" id="themeBtn" style="font-size:18px;border:none;background:transparent;padding:4px">🌙</button>
</div>
<div id="connBanner"></div>
<div class="content">
  <div class="tab on" id="t-cal"></div>
  <div class="tab" id="t-stock"></div>
  <div class="tab" id="t-svc"></div>
  <div class="tab" id="t-stats"></div>
  <div class="tab" id="t-exp"></div>
</div>
<nav class="bnav">
  <button class="nb on" data-tab="cal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v3M16 2v3M3 8h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/></svg>Записи</button>
  <button class="nb" data-tab="stock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16V8zM3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>Склад</button>
  <button class="nb" data-tab="svc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Послуги</button>
  <button class="nb" data-tab="stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18M7 16l4-4 4 4 4-4"/></svg>Аналітика</button>
  <button class="nb" data-tab="exp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Витрати</button>
</nav>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,setDoc,onSnapshot,query,orderBy,enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyBtEcQ69spy8Lp8R6ttJOX8krl1iH2j8X4",
  authDomain:"beauty-crm-8141c.firebaseapp.com",
  projectId:"beauty-crm-8141c",
  storageBucket:"beauty-crm-8141c.firebasestorage.app",
  messagingSenderId:"1011794290495",
  appId:"1:1011794290495:web:d5dac454ea696e4924158a"
}));

// Keep the last-known data cached on the device (IndexedDB). Without this,
// every time the phone drops signal / the tab is backgrounded and resumed,
// Firestore has to re-fetch everything from the network before it can show
// anything again — which is the "app freezes / everything disappears then
// comes back" symptom. With persistence on, a reconnect serves the cached
// data instantly while the fresh data loads quietly in the background.
try{ await enableIndexedDbPersistence(db); }
catch(e){ /* multiple tabs open, or browser doesn't support it — app still works, just without the cache cushion */ }

// ── State ──────────────────────────────────────────
let svcs=[], mats=[], appts=[], ops=[], exps=[], drafts=[];
let tab='cal', calView=1;
let stockCat='Всі', stockQ='', period='month';
let periodFrom='', periodTo='';
let histType='Всі', histQ='';
let backfillRunning=false;
let expCat='Всі', expPeriod='month';
let customExpCats=JSON.parse(localStorage.getItem('expCats')||'[]');
let theme=localStorage.getItem('theme')||'dark';
let schedule=JSON.parse(localStorage.getItem('sched')||'{"days":[1,2,3,4,5,6],"start":9,"end":19}');
let exceptions=JSON.parse(localStorage.getItem('exc')||'{}');

const d0=new Date();
let calDate=d0.getFullYear()+'-'+String(d0.getMonth()+1).padStart(2,'0')+'-'+String(d0.getDate()).padStart(2,'0');

// ── Theme ──────────────────────────────────────────
function applyTheme(){
  document.body.classList.toggle('light',theme==='light');
  document.getElementById('themeBtn').textContent=theme==='dark'?'☀️':'🌙';
}
applyTheme();
document.getElementById('themeBtn').onclick=()=>{theme=theme==='dark'?'light':'dark';localStorage.setItem('theme',theme);applyTheme();};

// ── Utils ──────────────────────────────────────────
const $=id=>document.getElementById(id);
const fmt=n=>new Intl.NumberFormat('uk-UA').format(Math.round(n||0));
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const addDays=(d,n)=>{const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');};
const fmtL=d=>new Date(d+'T12:00:00').toLocaleDateString('uk-UA',{day:'numeric',month:'long'});
const fmtS=d=>new Date(d+'T12:00:00').toLocaleDateString('uk-UA',{day:'numeric',month:'short'});
const DN=['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
// The calendar grid's visible hours now follow whatever start/end you set in
// the schedule (⚙️) modal, instead of always showing a fixed 8:00–20:30
// range regardless of your actual working hours.
const getHours=()=>{const len=Math.max(1,schedule.end-schedule.start);return Array.from({length:len},(_,i)=>i+schedule.start);};
const SLOTS=Array.from({length:26},(_,i)=>({h:Math.floor(i/2)+8,m:i%2===0?0:30}));
const HALF_HOURS=Array.from({length:26},(_,i)=>i*0.5+8); // 8:00, 8:30, 9:00...20:00
const CATS=['Фарби','Окислювачі','Порошки','Шампуні','Маски','Кондиціонери','Стайлінг','Інше'];
// Base expense categories are always shown; any category the person adds
// via the "+ Нова категорія" option in expModal is remembered in
// localStorage (customExpCats) and appended after them, same pattern as
// the schedule/exceptions persistence used elsewhere in the app.
const BASE_EXP_CATS=['Оренда','Податки','Комунальні','Подарунки','Реклама','Інше'];
const getExpCats=()=>[...BASE_EXP_CATS,...customExpCats.filter(c=>!BASE_EXP_CATS.includes(c))];
const svg=(d,s=16,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`;
const ic={plus:'M12 5v14M5 12h14',edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z',del:'M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6',x:'M18 6L6 18M6 6l12 12',l:'M15 18l-6-6 6-6',r:'M9 18l6-6-6-6',w:'M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01',h:'M16 16l-4 4-4-4M12 12v8M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3'};

// Shared unit/pricing info for a material — same logic spendModal uses to
// decide whether it's spent by шт or by г/мл, and what one unit costs.
// Used both by spendModal and by the appointment materials section so the
// two stay consistent.
function matUnitInfo(m){
  const byG=!!(m&&m.spendUnit&&m.spendUnit!=='шт'&&m.volPerUnit>0);
  const unit=byG?m.spendUnit:'шт';
  const ppu=byG?(m.avgPricePerUnit||m.pricePerUnit||0):(m?.avgPrice||m?.price||0);
  const availUnits=byG?(m?.qty||0)*m.volPerUnit:(m?.qty||0);
  return{byG,unit,ppu,availUnits};
}
// Converts a quantity expressed in the material's spend-unit (шт or г/мл)
// into шт, for adjusting the stored stock qty (which is always in шт).
function unitsToSht(m,units){
  const{byG}=matUnitInfo(m);
  return byG?units/m.volPerUnit:units;
}

// ── Schedule ───────────────────────────────────────
const isWorkDay=d=>{if(exceptions[d]===true)return true;if(exceptions[d]===false)return false;return schedule.days.includes(new Date(d+'T12:00:00').getDay());};
const getWorkMins=d=>isWorkDay(d)?(schedule.end-schedule.start)*60:0;
// Uses the shared apptDuration() (declared below, hoisted) so a day's
// "how booked is it" percentage matches what's actually on the calendar
// grid — counting every service on a multi-service appointment and
// respecting a manually-resized duration, not just the first service.
const getBookedMins=d=>appts.filter(a=>a.date===d&&a.status!=='cancelled').reduce((s,a)=>s+apptDuration(a),0);
const dayColor=d=>{const t=getWorkMins(d);if(!t)return'#4E5460';const p=getBookedMins(d)/t;if(p<=0)return'#4E5460';if(p<.5)return'#7BAF8A';if(p<.75)return'#D4A853';if(p<1)return'#E07B39';return'#B87070';};
const dayRing=d=>{
  const t=getWorkMins(d);if(!t)return'';
  const p=Math.min(getBookedMins(d)/t,1),r=9,C=2*Math.PI*r,col=dayColor(d);
  if(p<=0)return`<svg width="22" height="22" viewBox="0 0 26 26" style="position:absolute;top:0;left:50%;transform:translateX(-50%)"><circle cx="13" cy="13" r="${r}" fill="none" stroke="rgba(128,128,128,.2)" stroke-width="2"/></svg>`;
  const dash=p*C,gap=C-dash,off=p>=1?0:C/4;
  return`<svg width="22" height="22" viewBox="0 0 26 26" style="position:absolute;top:0;left:50%;transform:translateX(-50%)">
    <circle cx="13" cy="13" r="${r}" fill="none" stroke="rgba(128,128,128,.2)" stroke-width="2"/>
    <circle cx="13" cy="13" r="${r}" fill="none" stroke="${col}" stroke-width="2.5" stroke-dasharray="${dash.toFixed(2)} ${Math.max(0,gap-.01).toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" stroke-linecap="${p>=1?'butt':'round'}"/>
  </svg>`;
};

// ── Firebase ───────────────────────────────────────
// All four listeners funnel into scheduleDraw() instead of draw() directly.
// On first load (or after a reconnect) they tend to fire within a few
// milliseconds of each other; calling draw() from each one separately used
// to force up to 4 full re-renders back-to-back, which is what showed up as
// a brief freeze/stutter, especially on older phones. Coalescing them into
// a single animation-frame pass fixes that.
let drawQueued=false;
function scheduleDraw(){
  if(drawQueued)return;
  drawQueued=true;
  requestAnimationFrame(()=>{drawQueued=false;draw();});
}

let connIssue=false;
function setConnBanner(bad){
  if(bad===connIssue)return;
  connIssue=bad;
  $('connBanner').innerHTML=bad?`<div class="alert alert-conn">📶 Немає з'єднання — показані останні збережені дані</div>`:'';
}
// Every listener shares the same error handler: on a real connection drop
// Firestore keeps retrying on its own, so we just surface a small banner
// instead of letting the tab go silently blank/unresponsive. We deliberately
// do NOT clear svcs/mats/appts/ops on error — the last good data stays on
// screen until a fresh snapshot actually arrives.
const onErr=e=>{console.warn('Firestore listener error:',e);setConnBanner(true);};

onSnapshot(collection(db,'services'),s=>{svcs=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));setConnBanner(false);scheduleDraw();},onErr);
onSnapshot(collection(db,'materials'),s=>{mats=s.docs.map(d=>({id:d.id,...d.data()}));setConnBanner(false);scheduleDraw();},onErr);
onSnapshot(collection(db,'appointments'),s=>{
  appts=s.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>a.date===b.date?(a.time||'').localeCompare(b.time||''):(a.date||'').localeCompare(b.date||''));
  setConnBanner(false);scheduleDraw();
},onErr);
onSnapshot(collection(db,'purchases'),s=>{ops=s.docs.map(d=>({id:d.id,...d.data()}));setConnBanner(false);scheduleDraw();},onErr);
onSnapshot(collection(db,'expenses'),s=>{exps=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));setConnBanner(false);scheduleDraw();},onErr);
onSnapshot(collection(db,'drafts'),s=>{drafts=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));setConnBanner(false);scheduleDraw();},onErr);

$('hdate').textContent=fmtL(today());

// ── Tabs ───────────────────────────────────────────
document.querySelectorAll('.nb').forEach(b=>b.addEventListener('click',()=>{
  tab=b.dataset.tab;
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');$('t-'+tab).classList.add('on');draw();
}));

// ── Modal ──────────────────────────────────────────

// CALENDAR
// ══════════════════════════════════════════════════
function updateNowLine(dates, todayStr){
  // Remove old line
  document.querySelectorAll('.now-line').forEach(el=>el.remove());
  const todayIdx = dates.indexOf(todayStr);
  if(todayIdx<0) return; // today not visible
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  if(h<schedule.start||h>=schedule.end) return; // outside visible range
  const minsFromStart = (h-schedule.start)*60+m;
  const topPx = (minsFromStart/30)*30; // 30px per 30min row
  const wrap = document.getElementById('calGridWrap');
  if(!wrap) return;
  const cols = wrap.querySelectorAll('.CAL-COL.TC, .CAL-COL.COL-H');
  // Find the target column by index among TC-bearing columns
  const allTC = wrap.querySelectorAll('[data-d]');
  if(allTC.length===0) return;
  // Get unique dates in order
  const uniqueDates=[...new Set([...allTC].map(e=>e.dataset.d))];
  const colCount = uniqueDates.length;
  // Find first TC cell for the today column to get its position
  const targetCell = wrap.querySelector(`[data-d="${todayStr}"]`);
  if(!targetCell) return;
  const cellRect = targetCell.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  const colLeft = cellRect.left - wrapRect.left + wrap.scrollLeft;
  const colWidth = cellRect.width;
  // Find header height (all rows above hour 8:00)
  const firstRow = wrap.querySelector('[data-h="08:00"]');
  if(!firstRow) return;
  const firstRowRect = firstRow.getBoundingClientRect();
  const topOffset = firstRowRect.top - wrapRect.top + wrap.scrollTop;
  const finalTop = topOffset + topPx;

  const line=document.createElement('div');
  line.className='now-line';
  line.style.left=colLeft+'px';
  line.style.width=colWidth+'px';
  line.style.top=finalTop+'px';
  line.innerHTML=`<div class="now-dot"></div><div class="now-label">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}</div>`;
  wrap.style.position='relative';
  wrap.appendChild(line);
}

// Effective duration of ONE appointment, in minutes — always looked up by
// appointment id, never by service, so two appointments sharing the same
// service never share a duration or affect one another.
function apptDuration(a){
  const svc=svcs.find(s=>s.id===a.serviceId);
  const totalDur=a.services
    ? a.services.reduce((s,ss)=>{const sid=typeof ss==='object'?ss.serviceId:ss;return s+(svcs.find(sv=>sv.id===sid)?.duration||60);},0)
    : (svc?.duration||60);
  return Math.min(a.customDuration||totalDur,480);
}

// The full nominal price of ONE appointment — sum of every selected service
// with its own discount/markup applied, not just the first/primary service.
// Used as the fallback when "Оплачено" was left empty, so revenue for a
// multi-service or discounted visit isn't silently undercounted down to
// whatever the first service alone costs.
function apptTotalPrice(a){
  if(a.services&&Array.isArray(a.services)){
    return a.services.reduce((s,ss)=>{
      const sid=typeof ss==='object'?ss.serviceId:ss;
      const adj=typeof ss==='object'?(ss.adj||0):0;
      return s+Math.max(0,(svcs.find(sv=>sv.id===sid)?.price||0)+adj);
    },0);
  }
  return svcs.find(sv=>sv.id===a.serviceId)?.price||0;
}

// Single global gesture manager for drag & resize — avoids stale closures.
// IMPORTANT: while a gesture is in progress we do NOT write to Firestore and
// we do NOT let drawCal() rebuild the grid. Previously every touchmove during
// a drag wrote to Firestore, which fired onSnapshot -> draw() -> a full
// innerHTML rebuild of the calendar mid-gesture. That destroyed the exact
// DOM node under the user's finger (and any other block's listeners along
// with it), which is why blocks looked like they wouldn't drag or resize.
const GESTURE={mode:null,block:null,appt:null,startX:0,startY:0,origDur:0,origLeft:0,origTop:0,origWidth:0,pendingDate:null,pendingTime:null};

// Maps a screen point to the calendar cell under it, snapped to 5-minute
// increments. Returns null if the point isn't over a cell.
function cellFromPoint(x,y){
  const el2=document.elementFromPoint(x,y);
  const cell=el2?.closest('.TC');
  if(!cell)return null;
  const rect=cell.getBoundingClientRect();
  const relY=Math.max(0,Math.min(30,y-rect.top));
  const minsOffset=Math.round(relY/5)*5;
  const baseH=+cell.dataset.h.split(':')[0];
  const baseM=+cell.dataset.h.split(':')[1];
  const totalMins=baseH*60+baseM+minsOffset;
  const newH=Math.floor(totalMins/60),newM=totalMins%60;
  return{date:cell.dataset.d,time:String(Math.min(schedule.end-1,newH)).padStart(2,'0')+':'+String(Math.min(55,newM)).padStart(2,'0')};
}

function gestureMove(e){
  if(!GESTURE.mode||!GESTURE.block||!GESTURE.appt)return;
  e.preventDefault();
  if(GESTURE.mode==='drag'){
    const touch=e.touches[0];
    const dx=touch.clientX-GESTURE.startX, dy=touch.clientY-GESTURE.startY;
    GESTURE.block.style.left=(GESTURE.origLeft+dx)+'px';
    GESTURE.block.style.top=(GESTURE.origTop+dy)+'px';
  } else if(GESTURE.mode==='resize'){
    const dy=e.touches[0].clientY-GESTURE.startY;
    const newH=Math.max(22,(GESTURE.origDur/60+dy/60)*60);
    GESTURE.block.style.height=newH+'px';
  }
}
async function gestureEnd(){
  const mode=GESTURE.mode, block=GESTURE.block, appt=GESTURE.appt;
  if(!mode)return; // ordinary tap, not a drag/resize — don't touch the DOM, let the click through
  if(mode==='drag'&&block){
    // Read the drop position from the card's ACTUAL on-screen top edge, right
    // now, at the moment of release — not from a value computed a moment
    // earlier during the last touchmove tick.
    const liveRect=block.getBoundingClientRect();
    const drop=cellFromPoint(liveRect.left+liveRect.width/2, liveRect.top+2);
    block.style.position='';block.style.left='';block.style.top='';block.style.width='';
    block.style.opacity='';block.style.zIndex='';block.style.pointerEvents='';
    if(appt&&drop&&(drop.date!==appt.date||drop.time!==appt.time)){
      // Written once, at the end, scoped to THIS appointment's id only.
      await updateDoc(doc(db,'appointments',appt.id),{date:drop.date,time:drop.time});
    }
  } else if(mode==='resize'&&block&&appt){
    const newDur=Math.max(15,Math.round((parseFloat(block.style.height)/60*60)/15)*15);
    block.style.transition='';
    // Saved on the APPOINTMENT itself (customDuration), not the shared service.
    await updateDoc(doc(db,'appointments',appt.id),{customDuration:newDur});
  }
  GESTURE.mode=null;GESTURE.block=null;GESTURE.appt=null;GESTURE.pendingDate=null;GESTURE.pendingTime=null;
  if(tab==='cal')drawCal();
}
document.addEventListener('touchmove',gestureMove,{passive:false});
document.addEventListener('touchend',gestureEnd,{passive:true});
document.addEventListener('touchcancel',()=>{
  if(!GESTURE.mode)return; // ordinary tap — nothing to clean up
  const block=GESTURE.block;
  if(block){block.style.position='';block.style.left='';block.style.top='';block.style.width='';block.style.opacity='';block.style.zIndex='';block.style.pointerEvents='';block.style.transition='';}
  GESTURE.mode=null;GESTURE.block=null;GESTURE.appt=null;GESTURE.pendingDate=null;GESTURE.pendingTime=null;
  if(tab==='cal')drawCal();
},{passive:true});

function drawCal(){
  if(GESTURE.mode)return; // a drag/resize is in progress — don't rebuild under the user's finger
  const el=$('t-cal');
  const dates=Array.from({length:calView},(_,i)=>addDays(calDate,i));
  const lbl=calView===1?fmtL(calDate):fmtS(calDate)+' – '+fmtS(dates[dates.length-1]);
  const todayStr=today();
  const pending=appts.filter(a=>a.date===calDate&&a.status==='pending').length;

  // Header row for day columns
  const hdrRow=`<div style="display:flex">
    <div style="width:44px;flex-shrink:0"></div>
    ${dates.map(d=>{
      const isT=d===todayStr,dn=DN[new Date(d+'T12:00:00').getDay()],day=new Date(d+'T12:00:00').getDate();
      return`<div class="CAL-COL COL-H ${isT?'tod':''}" style="position:relative;padding-top:6px;padding-bottom:6px;height:auto;min-height:28px">
        <span style="position:relative;z-index:1">${dn} <b>${day}</b></span>
      </div>`;
    }).join('')}
  </div>`;

  // Time rows with 30-min subgrid
  // Each hour = 2 rows of 30px each = 60px total
  const rows=getHours().map(h=>{
    const cells=dates.map(d=>{
      const da=appts.filter(a=>a.date===d&&a.time&&+a.time.split(':')[0]===h);
      const blocks=da.map((a,i)=>{
        const svc=svcs.find(s=>s.id===a.serviceId);
        const dur=apptDuration(a);
        const min=+(a.time.split(':')[1]||0);
        // 30px per 30 minutes
        const topPx=(min/30)*30;
        const hPx=Math.max((dur/30)*30,22);
        const cls=a.isBreak?'brk':a.status==='done'?'done':a.status==='cancelled'?'cancelled':'pending';
        const svcNames=a.services?a.services.map(s=>{const sid=typeof s==='object'?s.serviceId:s;return svcs.find(sv=>sv.id===sid)?.name||'';}).filter(Boolean).join('+'):(svc?.name||'');
        // If several appointments start in the same slot (e.g. identical
        // duplicated services), lay them out side-by-side instead of
        // stacking them exactly on top of one another — otherwise only the
        // topmost one is ever reachable by touch.
        const multi=da.length>1;
        const colW=100/da.length;
        const posStyle=multi
          ? `left:calc(${(colW*i).toFixed(4)}% + 2px);width:calc(${colW.toFixed(4)}% - 4px)`
          : `left:2px;right:2px`;
        return`<div class="AB ${cls}" style="top:${topPx}px;height:${hPx}px;${posStyle}" data-aid="${a.id}">
          <div style="display:flex;align-items:center;gap:4px">
            <div class="AB-DRAG" style="padding:2px 4px;cursor:grab;color:rgba(255,255,255,.4);font-size:10px;touch-action:none">⠿</div>
            <div class="AB-N" style="flex:1">${a.isBreak?'⏸ ':''}${a.client}</div>
          </div>
          <div class="AB-T">${a.time}${svcNames?' · '+svcNames:''}</div>
          <div class="AB-RES" data-resize="${a.id}"><div style="width:20px;height:2px;background:rgba(255,255,255,.25);border-radius:2px"></div></div>
        </div>`;
      }).join('');
      // Two 30px sub-rows per hour
      return`<div class="CAL-COL" style="position:relative;height:60px;border-left:1px solid var(--brd)">
        <div style="position:absolute;inset:0;pointer-events:none">
          <div style="height:30px;border-bottom:1px solid rgba(128,128,128,.05)"></div>
          <div style="height:30px;border-bottom:1px solid rgba(128,128,128,.08)"></div>
        </div>
        <div class="TC" style="position:absolute;inset:0;height:30px" data-d="${d}" data-h="${String(h).padStart(2,'0')}:00"></div>
        <div class="TC" style="position:absolute;top:30px;left:0;right:0;height:30px" data-d="${d}" data-h="${String(h).padStart(2,'0')}:30"></div>
        ${blocks}
      </div>`;
    }).join('');
    return`<div style="display:flex">
      <div style="width:44px;flex-shrink:0">
        <div class="TL" style="height:30px">${h}:00</div>
        <div style="height:30px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 6px 0 0;color:var(--dim);font-size:9px;opacity:.5">:30</div>
      </div>
      ${cells}
    </div>`;
  }).join('');

  el.innerHTML=`
    <div style="background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:10px 14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="bi" id="cprev">${svg(ic.l,16)}</button>
        <div id="cdatelbl" style="flex:1;text-align:center;cursor:pointer">
          <div style="font-weight:700;font-size:15px">${lbl}</div>
          <div style="font-size:11px;color:var(--dim)">${pending} очікує</div>
        </div>
        <button class="bi" id="cnext">${svg(ic.r,16)}</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
      <div style="display:flex;gap:4px;flex:1">
        <button class="vb ${calView===1?'on':''}" data-cv="1">День</button>
        <button class="vb ${calView===2?'on':''}" data-cv="2">2 дні</button>
        <button class="vb ${calView===7?'on':''}" data-cv="7">Тиждень</button>
      </div>
      <button class="btn bp bs" id="cadd">${svg(ic.plus,14)} Запис</button>
      <button class="btn bg bs" id="cbreak">⏸ Перерва</button>
      <button class="bi" id="csched">⚙️</button>
    </div>
    <div style="overflow-x:auto;border:1px solid var(--brd);border-radius:10px;position:relative" id="calGridWrap">
      ${hdrRow}
      <div style="position:relative">${rows}</div>
    </div>`;

  $('cprev').onclick=e=>{e.stopPropagation();calDate=addDays(calDate,-calView);drawCal();};
  $('cnext').onclick=e=>{e.stopPropagation();calDate=addDays(calDate,calView);drawCal();};
  $('cdatelbl').onclick=()=>miniCalModal();
  $('cadd').onclick=()=>apptModal(null,calDate,'10:00');
  $('cbreak').onclick=()=>breakModal(null,calDate);
  $('csched').onclick=()=>schedModal();
  el.querySelectorAll('.vb').forEach(b=>b.addEventListener('click',()=>{calView=+b.dataset.cv;drawCal();}));
  el.querySelectorAll('.TC').forEach(c=>c.addEventListener('click',e=>{if(!e.target.closest('.AB'))apptModal(null,c.dataset.d,c.dataset.h);}));
  el.querySelectorAll('.AB').forEach(b=>b.addEventListener('click',e=>{
    if(e.target.closest('[data-resize]'))return;
    e.stopPropagation();
    const a=appts.find(x=>x.id===b.dataset.aid);
    if(!a)return;
    if(a.isBreak)breakModal(a);
    else apptModal(a,a.date,a.time);
  }));

  // Drag & Resize — bind handles to shared global gesture state
  el.querySelectorAll('.AB').forEach(block=>{
    // Long-press ANYWHERE on the block (except the resize strip) to start
    // dragging. A tiny dedicated handle icon is too small a target to hit
    // reliably on a real touchscreen — this is much easier to grab.
    block.addEventListener('touchstart',e=>{
      if(e.target.closest('[data-resize]'))return;
      const touch=e.touches[0];
      const startX=touch.clientX,startY=touch.clientY;
      let moved=false,started=false;
      const beginDrag=()=>{
        if(moved||started)return;
        started=true;
        const rect=block.getBoundingClientRect();
        GESTURE.mode='drag';
        GESTURE.block=block;
        GESTURE.appt=appts.find(x=>x.id===block.dataset.aid);
        GESTURE.startX=touch.clientX;GESTURE.startY=touch.clientY;
        GESTURE.origLeft=rect.left;GESTURE.origTop=rect.top;GESTURE.origWidth=rect.width;
        GESTURE.pendingDate=GESTURE.appt?.date||null;
        GESTURE.pendingTime=GESTURE.appt?.time||null;
        block.style.position='fixed';
        block.style.left=rect.left+'px';
        block.style.top=rect.top+'px';
        block.style.width=rect.width+'px';
        block.style.opacity='.85';block.style.zIndex='999';
        // Let touches "see through" the dragged block to the cell beneath it —
        // otherwise elementFromPoint() during the move just keeps hitting the
        // block itself, the drop cell is never detected, and the record snaps
        // back to its original slot on release.
        block.style.pointerEvents='none';
        if(navigator.vibrate)navigator.vibrate(10);
      };
      const longPressTimer=setTimeout(beginDrag,350);
      const onMove=ev=>{
        const t=ev.touches&&ev.touches[0];
        if(!t)return;
        if(!started&&(Math.abs(t.clientX-startX)>10||Math.abs(t.clientY-startY)>10)){
          moved=true;clearTimeout(longPressTimer);
        }
      };
      const onEnd=()=>{
        clearTimeout(longPressTimer);
        block.removeEventListener('touchmove',onMove);
        block.removeEventListener('touchend',onEnd);
        block.removeEventListener('touchcancel',onEnd);
      };
      block.addEventListener('touchmove',onMove,{passive:true});
      block.addEventListener('touchend',onEnd,{passive:true});
      block.addEventListener('touchcancel',onEnd,{passive:true});
    },{passive:true});
    const resizeHandle=block.querySelector('[data-resize]');
    if(resizeHandle){
      resizeHandle.addEventListener('touchstart',e=>{
        e.stopPropagation();
        GESTURE.mode='resize';
        GESTURE.block=block;
        GESTURE.appt=appts.find(x=>x.id===block.dataset.aid);
        // Per-appointment duration (respects existing customDuration), not
        // the shared service duration — so duplicated services never
        // resize together.
        GESTURE.origDur=GESTURE.appt?apptDuration(GESTURE.appt):60;
        GESTURE.startY=e.touches[0].clientY;
        block.style.transition='none';
      },{passive:true});
    }
  });

  // Now-line indicator
  updateNowLine(dates, todayStr);
}

// Mini Calendar Modal (opens at top)
function miniCalModal(){
  let vm=new Date(calDate+'T12:00:00');vm.setDate(1);
  function render(){
    const y=vm.getFullYear(),m=vm.getMonth();
    const lbl=vm.toLocaleDateString('uk-UA',{month:'long',year:'numeric'}).replace(/\s*р\.?\s*$/i,'');
    const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
    const off=first===0?6:first-1,todayStr=today();
    let cells='';
    for(let i=0;i<off;i++)cells+='<div></div>';
    for(let d=1;d<=dim;d++){
      const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isSel=ds===calDate,isT=ds===todayStr,isW=isWorkDay(ds);
      const isSelDay = ds===calDate;
      const p=getWorkMins(ds)>0?Math.min(getBookedMins(ds)/getWorkMins(ds),1):0;
      const col=dayColor(ds),r=9,C2=2*Math.PI*r,dash=p*C2,gap=C2-dash,off2=p>=1?0:C2/4;
      // Fullness ring — shown on every work day, selected or not, so you can
      // still see how booked a day is even while it's the open one.
      const ring=isW?`<svg width="100%" height="100%" viewBox="0 0 26 26" style="position:absolute;top:0;left:0">
        <circle cx="13" cy="13" r="${r}" fill="none" stroke="rgba(128,128,128,.15)" stroke-width="2"/>
        ${p>0?`<circle cx="13" cy="13" r="${r}" fill="none" stroke="${col}" stroke-width="2.5" stroke-dasharray="${dash.toFixed(2)} ${Math.max(0,gap-.01).toFixed(2)}" stroke-dashoffset="${off2.toFixed(2)}" stroke-linecap="${p>=1?'butt':'round'}"/>`:''}
      </svg>`:'';
      // Selected day: bold + full-contrast text (adapts to theme) over the
      // ring, no colored background — so it stands out even if it happens to
      // fall on a non-work (dim) day.
      const numColor = isSelDay?'var(--txt)':isW?'var(--acc)':'var(--dim)';
      const numWeight = isSelDay||isT?700:isW?600:400;
      const bgCircle = isT&&!isSelDay?'rgba(168,155,194,.15)':'transparent';
      cells+=`<div style="position:relative;width:36px;height:36px;margin:2px auto;cursor:${isW||isSelDay?'pointer':'default'}" data-date="${ds}">
        ${ring}
        <div style="position:absolute;inset:2px;border-radius:50%;background:${bgCircle}"></div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:${numWeight};color:${numColor}">
          ${d}
        </div>
      </div>`;
    }
    $('modal').innerHTML=`
      <div class="mh">
        <button class="bi" id="mprev">${svg(ic.l,18)}</button>
        <div style="font-size:15px;font-weight:700;text-transform:capitalize">${lbl}</div>
        <button class="bi" id="mnext">${svg(ic.r,18)}</button>
        <button class="bi" id="mx">${svg(ic.x,18)}</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px;text-align:center">
        ${['Пн','Вт','Ср','Чт','Пт','Сб','Нд'].map(d=>`<div style="font-size:10px;font-weight:700;color:var(--dim);padding:3px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">${cells}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap;font-size:11px;color:var(--mut)">
        <span><span style="color:#7BAF8A">●</span> Вільно</span>
        <span><span style="color:#D4A853">●</span> 50%+</span>
        <span><span style="color:#E07B39">●</span> 75%+</span>
        <span><span style="color:#B87070">●</span> Заповнено</span>
      </div>`;
    $('mx').onclick=hide;
    $('mprev').onclick=()=>{vm.setMonth(vm.getMonth()-1);render();};
    $('mnext').onclick=()=>{vm.setMonth(vm.getMonth()+1);render();};
    $('modal').querySelectorAll('[data-date]').forEach(el=>{
      const d=el.dataset.date;
      let pressT=null;
      el.addEventListener('touchstart',()=>{pressT=setTimeout(()=>{
        if(exceptions[d]===true)delete exceptions[d];
        else if(exceptions[d]===false)delete exceptions[d];
        else if(isWorkDay(d))exceptions[d]=false;
        else exceptions[d]=true;
        localStorage.setItem('exc',JSON.stringify(exceptions));render();
      },600);},{passive:true});
      el.addEventListener('touchend',()=>clearTimeout(pressT));
      el.addEventListener('click',()=>{if(isWorkDay(d)){calDate=d;hide();drawCal();}});
    });
  }
  show('');render();
}

    <div class="g2">
      <div class="field"><label>Початок</label><select class="fi" id="wstart">${ho(schedule.start)}</select></div>
      <div class="field"><label>Кінець</label><select class="fi" id="wend">${ho(schedule.end)}</select></div>
    </div>
    <div class="mf">
      <button class="btn bg" id="mc">Скасувати</button>
      <button class="btn bp" id="ms">Зберегти</button>
    </div>`);
  $('mx').onclick=hide;$('mc').onclick=hide;
  $('modal').querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
  $('ms').onclick=()=>{
    schedule={days:[...$('modal').querySelectorAll('[data-day].on')].map(b=>+b.dataset.day),start:+$('wstart').value,end:+$('wend').value};
    localStorage.setItem('sched',JSON.stringify(schedule));hide();drawCal();
  };
}

// Appointment Modal — multiple services
function apptModal(a,date,time){
  // selectedServices: [{serviceId, price}]
  // Init services - support both old format (serviceId string) and new (array of objects)
  let selSvcs = [];
  if(a){
    if(a.services && Array.isArray(a.services)){
      selSvcs = a.services.map(s=>typeof s==='object'?s:{serviceId:s,adj:0});
    } else if(a.serviceId){
      selSvcs = [{serviceId:a.serviceId,adj:0}];
    }
  }
  // Materials actually used for this appointment — {matId, qty} where qty is
  // expressed in that material's spend-unit (шт, or г/мл if configured).
  let selMats = a?.materialsUsed ? a.materialsUsed.map(m=>({matId:m.matId,qty:m.qty})) : [];
  // Effective duration in minutes shown/edited in the modal. Starts from
  // whatever is actually saved on the appointment (customDuration, e.g. set
  // by dragging the resize handle on the calendar) or, failing that, the sum
  // of the selected services' durations. null = "not yet touched by the user
  // in this modal session", so it keeps auto-tracking the services total.
  let durOverride = a?.customDuration || null;
  // The other fields also need to survive a re-render (triggered when adding
  // or removing a service) — otherwise anything the user just typed gets
  // thrown away and replaced with the original appointment's values.
  let fClient=a?.client||'', fPhone=a?.phone||'', fDate=a?.date||date||today(),
      fTime=a?.time||time||'10:00', fStatus=a?.status||'pending', fPaid=a?.paid||0, fTips=a?.tips||0, fNote=a?.note||'';
  let matSearchQ='';
  const captureFields=()=>{
    if($('fc'))fClient=$('fc').value;
    if($('fp'))fPhone=$('fp').value;
    if($('fd'))fDate=$('fd').value;
    if($('ft'))fTime=$('ft').value;
    if($('fst'))fStatus=$('fst').value;
    if($('fm'))fPaid=+$('fm').value||0;
    if($('ftip'))fTips=+$('ftip').value||0;
    if($('fn'))fNote=$('fn').value;
    if($('fmsearch'))matSearchQ=$('fmsearch').value;
    const hEl=$('fdh'),mEl=$('fdm');if(hEl&&mEl)durOverride=+hEl.value*60+ +mEl.value;
  };

  function renderApptModal(){
    const opts=svcs.map(s=>`<option value="${s.id}">${s.name} — ${fmt(s.price)} грн</option>`).join('');
    const fmtDur=d=>{const h=Math.floor(d/60),m=d%60;return(h>0?h+'г ':'')+( m>0?m+'хв':'');};
    const selRows=selSvcs.map((ss,i)=>{
      const svc=svcs.find(s=>s.id===ss.serviceId);
      const baseP=svc?.price||0;
      const adj=ss.adj||0; // positive=markup, negative=discount
      const finalP=Math.max(0,baseP+adj);
      return`<div style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div><div style="font-size:13px;font-weight:600">${svc?.name||'?'}</div>
          <div style="font-size:11px;color:var(--mut)">${fmtDur(svc?.duration||60)} · база: ${fmt(baseP)} грн</div></div>
          <button class="bi bs" data-rmsvc="${i}">${svg(ic.x,12,'var(--err)')}</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1">
            <div style="font-size:10px;color:var(--mut);margin-bottom:3px">Знижка(-) / Наценка(+) грн</div>
            <input type="number" value="${adj}" style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px 8px;color:var(--txt);font-size:13px;outline:none" data-adj="${i}" placeholder="0"/>
          </div>
          <div style="text-align:right;min-width:70px">
            <div style="font-size:10px;color:var(--mut)">Підсумок</div>
            <div style="font-size:15px;font-weight:700;color:${adj<0?'var(--wrn)':adj>0?'var(--ok)':'var(--acs)'}">${fmt(finalP)} грн</div>
          </div>
        </div>
      </div>`;
    }).join('');
    const totalPrice=selSvcs.reduce((s,ss)=>s+Math.max(0,(svcs.find(sv=>sv.id===ss.serviceId)?.price||0)+(ss.adj||0)),0);
    const totalDurMin=selSvcs.reduce((s,ss)=>s+(svcs.find(sv=>sv.id===ss.serviceId)?.duration||60),0);
    const totalDur=totalDurMin; // keep for compat
    const fmtTotalDur=d=>{const h=Math.floor(d/60),m=d%60;return(h>0?h+'г ':'')+( m>0?m+'хв':'');};

    // ── Materials used on this appointment ──────────────────────────
    const matListSorted=[...mats].sort((x,y)=>x.name.localeCompare(y.name));
    const renderMatPickList=q=>{
      const ql=(q||'').toLowerCase();
      const filtered=matListSorted.filter(m=>!ql||m.name.toLowerCase().includes(ql));
      return filtered.length?filtered.map(m=>{
        const{unit}=matUnitInfo(m);
        return`<div style="padding:9px 12px;border-bottom:1px solid var(--brd);cursor:pointer;display:flex;justify-content:space-between" data-pickmat="${m.id}">
          <span style="font-size:13px">${m.name}</span><span style="font-size:11px;color:var(--mut)">${unit}</span>
        </div>`;
      }).join(''):'<div style="padding:12px;color:var(--dim);text-align:center;font-size:12px">Нічого не знайдено</div>';
    };
    const matRows=selMats.map((sm,i)=>{
      const m=mats.find(x=>x.id===sm.matId);
      const{unit,ppu,availUnits}=matUnitInfo(m);
      // When editing an existing appointment, whatever this line already
      // consumed is still "available" to re-allocate (it was already
      // deducted once), so add it back for the purposes of this warning.
      const alreadyUsed=(a?.materialsUsed||[]).find(x=>x.matId===sm.matId);
      const effAvail=availUnits+(alreadyUsed?alreadyUsed.qty:0);
      const cost=(sm.qty||0)*ppu;
      const over=sm.qty>effAvail;
      return`<div style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-size:13px;font-weight:600">${m?.name||'?'}</div>
          <button class="bi bs" data-rmmat="${i}">${svg(ic.x,12,'var(--err)')}</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1">
            <div style="font-size:10px;color:var(--mut);margin-bottom:3px">Кількість (${unit})</div>
            <input type="number" step="0.1" value="${sm.qty}" style="width:100%;background:var(--bg);border:1px solid ${over?'var(--err)':'var(--brd)'};border-radius:6px;padding:6px 8px;color:var(--txt);font-size:13px;outline:none" data-matqty="${i}"/>
          </div>
          <div style="text-align:right;min-width:70px">
            <div style="font-size:10px;color:var(--mut)">Вартість</div>
            <div style="font-size:14px;font-weight:700;color:var(--sil)" data-matcost="${i}">${cost.toFixed(2)} грн</div>
          </div>
        </div>
        <div style="font-size:10px;color:${over?'var(--err)':'var(--dim)'};margin-top:4px" data-matwarn="${i}">${over?'⚠️ Перевищує залишок — ':''}Доступно: ${effAvail.toFixed(1)} ${unit}</div>
      </div>`;
    }).join('');
    const totalMatCost=selMats.reduce((s,sm)=>{const m=mats.find(x=>x.id===sm.matId);return s+(sm.qty||0)*matUnitInfo(m).ppu;},0);
    const margin=totalPrice-totalMatCost;
    const marginPct=totalPrice>0?(margin/totalPrice*100):0;
    // The duration actually shown to the user — the manual override if one
    // exists (from a resize on the calendar, or a prior edit in this modal),
    // otherwise the natural sum of the chosen services.
    const shownDur=Math.min(durOverride!==null?durOverride:totalDurMin,480);
    const curH=Math.floor(shownDur/60), curMraw=shownDur%60, curM=[0,15,30,45].reduce((best,m)=>Math.abs(m-curMraw)<Math.abs(best-curMraw)?m:best,0);

    $('modal').innerHTML=`
      <div class="mh"><div class="mt">${a?'Редагувати':'Новий запис'}</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
      <div class="field"><label>Клієнтка</label><input class="fi" id="fc" value="${fClient}" placeholder="Ім'я Прізвище"/></div>
      <div class="field"><label>Телефон</label><input class="fi" id="fp" value="${fPhone}" placeholder="+380..."/></div>
      <div class="field"><label>Послуги <span id="svcHeaderInfo" style="color:var(--acc);font-weight:700">${selSvcs.length>0?`${selSvcs.length} · ${fmt(totalPrice)} грн · ${fmtTotalDur(shownDur)}`:''}</span></label>
        ${selRows}
        <select class="fi" id="fsadd" style="margin-top:8px">
          <option value="">+ Додати послугу</option>${opts}
        </select>
      </div>
      <div class="field"><label>Матеріали на запис <span id="matHeaderInfo" style="color:var(--acc);font-weight:700">${selMats.length>0?`${selMats.length} · ${totalMatCost.toFixed(2)} грн`:''}</span></label>
        ${matRows}
        <input class="fi" id="fmsearch" style="margin-top:8px" placeholder="🔍 Пошук матеріалу..." value="${matSearchQ}"/>
        <div id="matPickList" style="max-height:160px;overflow-y:auto;border:1px solid var(--brd);border-radius:8px;margin-top:6px">${renderMatPickList(matSearchQ)}</div>
      </div>
      <div class="card" style="margin-bottom:13px;padding:12px 14px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--mut)">Собівартість матеріалів:</span><span id="fmatcosttxt" style="font-weight:700;color:var(--err)">${totalMatCost.toFixed(2)} грн</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--mut)">Маржа:</span><span id="fmargintxt" style="font-weight:700;color:${margin>=0?'var(--ok)':'var(--err)'}">${fmt(margin)} грн (${marginPct.toFixed(0)}%)</span></div>
      </div>
      <div class="field"><label>Тривалість запису в календарі <span id="durNote" style="color:var(--mut);font-weight:400;text-transform:none">${durOverride!==null&&durOverride!==totalDurMin?'(змінено вручну)':''}</span></label>
        <div class="g2">
          <select class="fi" id="fdh">${Array.from({length:9},(_,i)=>`<option value="${i}" ${curH===i?'selected':''}>${i} год</option>`).join('')}</select>
          <select class="fi" id="fdm">${[0,15,30,45].map(m=>`<option value="${m}" ${curM===m?'selected':''}>${m} хв</option>`).join('')}</select>
        </div>
      </div>
      <div class="g2">
        <div class="field"><label>Дата</label><input type="date" class="fi" id="fd" value="${fDate}"/></div>
        <div class="field"><label>Час</label><input type="time" class="fi" id="ft" value="${fTime}"/></div>
      </div>
      <div class="field"><label>Статус</label><select class="fi" id="fst">
        <option value="pending" ${fStatus==='pending'?'selected':''}>Очікує</option>
        <option value="done" ${fStatus==='done'?'selected':''}>Виконано</option>
        <option value="cancelled" ${fStatus==='cancelled'?'selected':''}>Скасовано</option>
      </select></div>
      <div class="field"><label>Оплачено (грн)</label><input type="number" class="fi" id="fm" value="${fPaid}"/></div>
      <div class="field"><label>Чайові (грн)</label><input type="number" class="fi" id="ftip" value="${fTips}" placeholder="0"/></div>
      <div class="field"><label>Примітка</label><textarea class="fi" id="fn">${fNote}</textarea></div>
      <div class="mf">
        ${a?`<button class="btn bd bs" id="fdel">Видалити</button>`:''}
        <button class="btn bg" id="fcancel">Скасувати</button>
        <button class="btn bp" id="fsave">Зберегти</button>
      </div>`;

    $('mx').onclick=hide;$('fcancel').onclick=hide;
    // Reads whatever is currently sitting in the adj / material-qty inputs
    // back into selSvcs/selMats. Must run before any re-render (adding or
    // removing a service/material, or the duration selects triggering
    // captureFields), otherwise those in-progress edits get discarded.
    const captureLiveInputs=()=>{
      $('modal').querySelectorAll('[data-adj]').forEach(inp=>{if(selSvcs[+inp.dataset.adj])selSvcs[+inp.dataset.adj].adj=+inp.value||0;});
      $('modal').querySelectorAll('[data-matqty]').forEach(inp=>{if(selMats[+inp.dataset.matqty])selMats[+inp.dataset.matqty].qty=+inp.value||0;});
    };
    const captureDur=()=>{captureLiveInputs();captureFields();};
    $('fdh').onchange=()=>{captureDur();updateAllLiveDisplays();};
    $('fdm').onchange=()=>{captureDur();updateAllLiveDisplays();};
    $('fsadd').onchange=e=>{
      if(!e.target.value)return;
      captureDur();
      const svcId=e.target.value;
      selSvcs.push({serviceId:svcId,adj:0});
      // Auto-carry the service's standard "recipe" materials into this
      // appointment — this is exactly what lets shampoo/conditioner count
      // toward the margin without being typed in every single visit.
      // Existing lines for the same material get topped up rather than
      // duplicated (e.g. two services in one visit that both use the same
      // conditioner).
      const svc=svcs.find(sv=>sv.id===svcId);
      (svc?.defaultMaterials||[]).forEach(dm=>{
        const existing=selMats.find(sm=>sm.matId===dm.matId);
        if(existing)existing.qty=(existing.qty||0)+(dm.qty||0);
        else selMats.push({matId:dm.matId,qty:dm.qty||0});
      });
      e.target.value='';
      renderApptModal();
    };
    $('modal').querySelectorAll('[data-rmsvc]').forEach(b=>b.onclick=()=>{
      captureDur();
      selSvcs.splice(+b.dataset.rmsvc,1);
      renderApptModal();
    });
    function bindMatPickHandlers(){
      $('modal').querySelectorAll('[data-pickmat]').forEach(el2=>{
        el2.onclick=()=>{
          captureDur();
          selMats.push({matId:el2.dataset.pickmat,qty:0});
          matSearchQ='';
          renderApptModal();
        };
      });
    }
    bindMatPickHandlers();
    $('fmsearch').addEventListener('input',e=>{
      $('matPickList').innerHTML=renderMatPickList(e.target.value);
      bindMatPickHandlers();
    });
    $('modal').querySelectorAll('[data-rmmat]').forEach(b=>b.onclick=()=>{
      captureDur();
      selMats.splice(+b.dataset.rmmat,1);
      renderApptModal();
    });
    // Single source of truth for every number that can change WITHOUT a full
    // re-render: the "Послуги N · сума · час" header, the "(змінено вручну)"
    // duration note, each material row's cost/over-limit warning, and the
    // materials-cost/margin card. Called on every discount, material qty,
    // and manual-duration edit, so nothing on screen goes stale until the
    // next add/remove.
    const fmtDurLive=d=>{const h=Math.floor(d/60),m=d%60;return(h>0?h+'г ':'')+(m>0?m+'хв':'');};
    function updateAllLiveDisplays(){
      const totalPrice2=selSvcs.reduce((s,ss)=>s+Math.max(0,(svcs.find(sv=>sv.id===ss.serviceId)?.price||0)+(ss.adj||0)),0);
      const totalDurMin2=selSvcs.reduce((s,ss)=>s+(svcs.find(sv=>sv.id===ss.serviceId)?.duration||60),0);
      const shownDur2=Math.min(durOverride!==null?durOverride:totalDurMin2,480);
      const hdr=$('svcHeaderInfo');
      if(hdr)hdr.textContent=selSvcs.length>0?`${selSvcs.length} · ${fmt(totalPrice2)} грн · ${fmtDurLive(shownDur2)}`:'';
      const note=$('durNote');
      if(note)note.textContent=(durOverride!==null&&durOverride!==totalDurMin2)?'(змінено вручну)':'';

      let totalMatCost2=0;
      selMats.forEach((sm,i)=>{
        const m=mats.find(x=>x.id===sm.matId);
        const{unit,ppu,availUnits}=matUnitInfo(m);
        const alreadyUsed=(a?.materialsUsed||[]).find(x=>x.matId===sm.matId);
        const effAvail=availUnits+(alreadyUsed?alreadyUsed.qty:0);
        const cost=(sm.qty||0)*ppu;
        totalMatCost2+=cost;
        const costEl=$('modal').querySelector(`[data-matcost="${i}"]`);
        if(costEl)costEl.textContent=cost.toFixed(2)+' грн';
        const over=sm.qty>effAvail;
        const warnEl=$('modal').querySelector(`[data-matwarn="${i}"]`);
        if(warnEl){warnEl.style.color=over?'var(--err)':'var(--dim)';warnEl.textContent=(over?'⚠️ Перевищує залишок — ':'')+'Доступно: '+effAvail.toFixed(1)+' '+unit;}
        const qtyInput=$('modal').querySelector(`[data-matqty="${i}"]`);
        if(qtyInput)qtyInput.style.borderColor=over?'var(--err)':'var(--brd)';
      });
      const mhdr=$('matHeaderInfo');
      if(mhdr)mhdr.textContent=selMats.length>0?`${selMats.length} · ${totalMatCost2.toFixed(2)} грн`:'';

      const margin2=totalPrice2-totalMatCost2, marginPct2=totalPrice2>0?(margin2/totalPrice2*100):0;
      const mc=$('fmatcosttxt'),mg=$('fmargintxt');
      if(mc)mc.textContent=totalMatCost2.toFixed(2)+' грн';
      if(mg){mg.textContent=fmt(margin2)+' грн ('+marginPct2.toFixed(0)+'%)';mg.style.color=margin2>=0?'var(--ok)':'var(--err)';}
    }
    $('modal').querySelectorAll('[data-adj]').forEach(inp=>inp.addEventListener('input',e=>{
      selSvcs[+inp.dataset.adj].adj=+e.target.value||0;
      updateAllLiveDisplays();
    }));
    $('modal').querySelectorAll('[data-matqty]').forEach(inp=>inp.addEventListener('input',e=>{
      selMats[+inp.dataset.matqty].qty=+e.target.value||0;
      updateAllLiveDisplays();
    }));
    $('fsave').onclick=async()=>{
      const client=$('fc').value;
      if(!client||selSvcs.length===0){alert("Заповніть ім'я та оберіть послугу");return;}
      // Read current adj + material qty values before saving
      $('modal').querySelectorAll('[data-adj]').forEach(inp=>{selSvcs[+inp.dataset.adj].adj=+inp.value||0;});
      $('modal').querySelectorAll('[data-matqty]').forEach(inp=>{selMats[+inp.dataset.matqty].qty=+inp.value||0;});
      const finalDuration=+$('fdh').value*60 + +$('fdm').value;
      const newStatus=$('fst').value;
      const apptDate=$('fd').value;
      const materialsUsedFinal=selMats.filter(sm=>sm.matId&&sm.qty>0).map(sm=>({matId:sm.matId,qty:sm.qty}));
      const materialCostFinal=materialsUsedFinal.reduce((s,sm)=>{const m=mats.find(x=>x.id===sm.matId);return s+sm.qty*matUnitInfo(m).ppu;},0);

      // Manual "Оплачено" amount, exactly as typed — no button, no auto
      // status changes. If left empty/0, analytics falls back to the full
      // service total (apptTotalPrice) for "Виконано" visits.
      const data={client,phone:$('fp').value,serviceId:selSvcs[0].serviceId,
        services:selSvcs.map(s=>({serviceId:s.serviceId,adj:s.adj||0})),
        date:apptDate,time:$('ft').value,status:newStatus,
        customDuration:finalDuration,
        materialsUsed:materialsUsedFinal,materialCost:materialCostFinal,
        paid:+$('fm').value||0,tips:+$('ftip').value||0,note:$('fn').value};
      let apptId;
      if(a){await updateDoc(doc(db,'appointments',a.id),data);apptId=a.id;}
      else{const ref=await addDoc(collection(db,'appointments'),data);apptId=ref.id;}

      // Stock correction: compare what was actually deducted before
      // ("effective old" — empty if the appointment was cancelled, since a
      // cancelled record's materials are already back on the shelf) against
      // what should be deducted now ("effective new" — also empty if the
      // record is being saved as cancelled). The difference per material is
      // subtracted from stock (positive delta = using more than before).
      const oldEffective=(a&&a.status!=='cancelled')?(a.materialsUsed||[]):[];
      const newEffective=(newStatus==='cancelled')?[]:materialsUsedFinal;
      const matIds=[...new Set([...oldEffective.map(x=>x.matId),...newEffective.map(x=>x.matId)])];
      for(const mid of matIds){
        const m=mats.find(x=>x.id===mid);if(!m)continue;
        const oldQ=oldEffective.find(x=>x.matId===mid)?.qty||0;
        const newQ=newEffective.find(x=>x.matId===mid)?.qty||0;
        const deltaUnits=newQ-oldQ;
        if(deltaUnits===0)continue;
        const deltaSht=unitsToSht(m,deltaUnits);
        // No Math.max(0, …) clamp here on purpose: if a write-off happens
        // before its matching "Прихід" is entered (spend first, receive
        // later — a normal real-world order), the stock temporarily goes
        // negative and self-corrects the moment the receive arrives. If we
        // floored it at 0 instead, the deduction would just be silently
        // lost and never recovered once new stock came in.
        await updateDoc(doc(db,'materials',mid),{qty:+((m.qty||0)-deltaSht).toFixed(4)});
        // Log net-new consumption into the same purchases/history trail as
        // a manual "Списати" — so material used via an appointment now
        // shows up in Історія операцій too, with the client's name as the
        // note. Only the increase is logged; reductions/cancellations
        // just quietly return stock, same as they always did.
        if(deltaUnits>0){
          const{unit,ppu}=matUnitInfo(m);
          await addDoc(collection(db,'purchases'),{matId:mid,matName:m.name,type:'spend',qty:deltaUnits,unit,total:deltaUnits*ppu,date:apptDate,note:client,apptId});
        }
      }
      hide();
    };
    if(a)$('fdel').onclick=async()=>{
      if(!confirm('Видалити?'))return;
      // Return materials to stock — but only what's actually still "out":
      // if the appointment was already cancelled, its materials were
      // already restored when it was cancelled, so there's nothing left to
      // return here.
      const effective=a.status!=='cancelled'?(a.materialsUsed||[]):[];
      for(const{matId,qty}of effective){
        const m=mats.find(x=>x.id===matId);if(!m)continue;
        const deltaSht=unitsToSht(m,qty);
        await updateDoc(doc(db,'materials',matId),{qty:+((m.qty||0)+deltaSht).toFixed(4)});
      }
      await deleteDoc(doc(db,'appointments',a.id));hide();
    };
  }
  show('');renderApptModal();
}

// Break / pause block — a lightweight non-client entry (lunch, consultation
// hold, etc). Stored in the same 'appointments' collection with isBreak:true
// so it reuses the existing drag/resize/rendering machinery for free, but is
// skipped everywhere client stats are computed (nothing sets a.status on it,
// and analytics only counts a.status==='done').
function breakModal(a,date){
  const label=a?.client||'Обід';
  const dur=a?.customDuration||60;
  const bDate=a?.date||date||calDate;
  const bTime=a?.time||'13:00';
  const hh=Math.floor(dur/60),mm=dur%60;
  show(`
    <div class="mh"><div class="mt">${a?'Редагувати блок часу':'Новий блок часу'}</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
    <div class="field"><label>Назва</label><input class="fi" id="bl" value="${label}" placeholder="Обід, консультація..."/></div>
    <div class="g2">
      <div class="field"><label>Дата</label><input type="date" class="fi" id="bd" value="${bDate}"/></div>
      <div class="field"><label>Час</label><input type="time" class="fi" id="bt" value="${bTime}"/></div>
    </div>
    <div class="field"><label>Тривалість</label>
      <div class="g2">
        <select class="fi" id="bdh">${Array.from({length:9},(_,i)=>`<option value="${i}" ${hh===i?'selected':''}>${i} год</option>`).join('')}</select>
        <select class="fi" id="bdm">${[0,15,30,45].map(m=>`<option value="${m}" ${mm===m?'selected':''}>${m} хв</option>`).join('')}</select>
      </div>
    </div>
    <div class="mf">
      ${a?`<button class="btn bd bs" id="bdel">Видалити</button>`:''}
      <button class="btn bg" id="bcancel">Скасувати</button>
      <button class="btn bp" id="bsave">Зберегти</button>
    </div>`);
  $('mx').onclick=hide;$('bcancel').onclick=hide;
  $('bsave').onclick=async()=>{
    const name=$('bl').value.trim()||'Перерва';
    const durMin=Math.max(5,+$('bdh').value*60 + +$('bdm').value);
    const data={client:name,isBreak:true,date:$('bd').value,time:$('bt').value,customDuration:durMin};
    if(a)await updateDoc(doc(db,'appointments',a.id),data);
    else await addDoc(collection(db,'appointments'),data);
    hide();
  };
  if(a)$('bdel').onclick=async()=>{if(confirm('Видалити блок?')){await deleteDoc(doc(db,'appointments',a.id));hide();}};
}

// STOCK
// ══════════════════════════════════════════════════
function drawStock(){
  const el=$('t-stock');
  const low=mats.filter(m=>m.qty<=m.minQty);
  const fil=mats.filter(m=>(stockCat==='Всі'||m.category===stockCat)&&(!stockQ||m.name.toLowerCase().includes(stockQ.toLowerCase())));
  const grp=CATS.map(c=>({c,items:fil.filter(m=>m.category===c).sort((x,y)=>{
    const xLow=x.qty<=x.minQty, yLow=y.qty<=y.minQty;
    if(xLow!==yLow)return xLow?-1:1; // low-stock items first
    return x.name.localeCompare(y.name);
  })})).filter(g=>g.items.length>0);
  el.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn bp bs" id="breceive">${svg(ic.h,14)} Прихід</button>
      <button class="btn bg bs" id="bnewmat">${svg(ic.plus,14)} Новий</button>
      <button class="btn bg bs" id="bhistory">📋 Історія</button>
      <button class="btn bg bs" id="bdrafts">📝 Чернетки${drafts.length?` (${drafts.length})`:''}</button>
    </div>
    <input class="fi" id="sq" style="margin-bottom:10px" placeholder="🔍 Пошук..." value="${stockQ}"/>
    ${low.length?`<div class="alert alert-d">${svg(ic.w,15,'var(--err)')} Закінчується: ${low.map(m=>m.name).join(', ')}</div>`:''}
    <div class="chips">${['Всі',...CATS].map(c=>`<button class="chip ${stockCat===c?'on':''}" data-c="${c}">${c}</button>`).join('')}</div>
    ${fil.length===0?'<div class="empty">Нічого не знайдено</div>':grp.map(({c,items})=>`
      <div class="sec">${c}</div>
      ${items.map(m=>{
        const isNeg=m.qty<0,isLow=!isNeg&&m.qty<=m.minQty,byG=m.spendUnit&&m.spendUnit!=='шт'&&m.volPerUnit>0;
        const tu=byG?fmt(m.qty*m.volPerUnit)+' '+m.spendUnit:'';
        const ppu=byG?(m.avgPricePerUnit||m.pricePerUnit||0).toFixed(2)+' грн/'+m.spendUnit:(m.avgPrice||m.price||0).toFixed(2)+' грн/шт';
        return`<div class="ri" style="border-left:3px solid ${isNeg?'var(--err)':isLow?'var(--err)':'var(--brd)'}">
          <div class="rl"><div class="rn">${m.name} ${isNeg?'<span style="background:rgba(184,112,112,.15);color:var(--err);padding:2px 7px;border-radius:10px;font-size:10px">⚠️ Очікує приходу</span>':isLow?'<span style="background:rgba(184,112,112,.15);color:var(--err);padding:2px 7px;border-radius:10px;font-size:10px">Мало</span>':''}</div>
          <div class="rs">${tu?tu+' · ':''}${ppu}</div></div>
          <div class="rr"><div class="rv" style="color:${isNeg||isLow?'var(--err)':'var(--acs)'}">${Number.isInteger(m.qty)?m.qty:m.qty.toFixed(2)} шт</div><div class="ra">мін. ${m.minQty}</div></div>
          <div class="rac">
            <button class="bi bs" data-sp="${m.id}">${svg('M5 12h14',13)}</button>
            <button class="bi bs" data-em="${m.id}">${svg(ic.edit,13)}</button>
            <button class="bi bs" data-dm="${m.id}">${svg(ic.del,13,'var(--err)')}</button>
          </div>
        </div>`;
      }).join('')}`).join('')}`;
  $('breceive').onclick=()=>receiveModal();
  $('bnewmat').onclick=()=>matModal(null);
  $('bhistory').onclick=()=>historyModal();
  $('bdrafts').onclick=()=>draftsListModal();
  // Search without losing focus
  $('sq').addEventListener('input',e=>{stockQ=e.target.value;
    const fil2=mats.filter(m=>(stockCat==='Всі'||m.category===stockCat)&&(!stockQ||m.name.toLowerCase().includes(stockQ.toLowerCase())));
    // Just re-render the list, not the whole tab
    drawStock();
    // Restore focus
    setTimeout(()=>{const el2=$('sq');if(el2){el2.focus();el2.setSelectionRange(el2.value.length,el2.value.length);}},10);
  });
  el.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{stockCat=b.dataset.c;drawStock();});
  el.querySelectorAll('[data-sp]').forEach(b=>b.onclick=()=>spendModal(b.dataset.sp));
  el.querySelectorAll('[data-em]').forEach(b=>b.onclick=()=>matModal(b.dataset.em));
  el.querySelectorAll('[data-dm]').forEach(b=>b.onclick=async()=>{if(confirm('Видалити?'))await deleteDoc(doc(db,'materials',b.dataset.dm));});
}

// Receive Modal — multi-item with search, no keyboard close
let rcvItems=[];
function receiveModal(draftId){
  const draft=draftId?drafts.find(x=>x.id===draftId):null;
  rcvItems=draft?draft.items.map(it=>({...it})):[];
  // Kept in JS (not just read from the DOM each time) so a full re-render —
  // triggered every time an item is added/removed — doesn't reset the date
  // back to today or wipe out a typed-in supplier note.
  let rDate=draft?.date||today(), rNote=draft?.note||'';
  let curDraftId=draftId||null;
  function render(searchVal=''){
    const fil2=mats.filter(m=>!searchVal||m.name.toLowerCase().includes(searchVal.toLowerCase()));
    const itemsHtml=rcvItems.map((it,idx)=>{
      const m=mats.find(x=>x.id===it.matId),dp=(it.price||0)*(1-(it.disc||0)/100);
      return`<div style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;font-weight:600">${m?.name||'?'}</span>
          <button class="bi bs" data-rem="${idx}">${svg(ic.x,12,'var(--err)')}</button>
        </div>
        <div class="g3">
          <div><div style="font-size:10px;color:var(--mut);margin-bottom:3px">К-сть</div>
            <input type="number" step="0.5" value="${it.qty}" style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px;color:var(--txt);font-size:13px;outline:none" data-qty="${idx}"/></div>
          <div><div style="font-size:10px;color:var(--mut);margin-bottom:3px">Ціна</div>
            <input type="number" value="${it.price}" style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px;color:var(--txt);font-size:13px;outline:none" data-price="${idx}"/></div>
          <div><div style="font-size:10px;color:var(--mut);margin-bottom:3px">Знижка %</div>
            <input type="number" value="${it.disc||0}" min="0" max="100" style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px;color:var(--txt);font-size:13px;outline:none" data-disc="${idx}"/></div>
        </div>
        <div style="font-size:11px;color:var(--mut);margin-top:6px" data-sum="${idx}">${(it.qty*dp).toFixed(2)} грн (ціна зі знижкою: ${dp.toFixed(2)} грн/шт)</div>
      </div>`;
    }).join('');
    const total=rcvItems.reduce((s,it)=>s+it.qty*(it.price||0)*(1-(it.disc||0)/100),0);
    const listHtml=fil2.map(m=>`<div style="padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer;display:flex;justify-content:space-between" data-add="${m.id}">
      <span style="font-size:13px">${m.name}</span>
      <span style="font-size:12px;color:var(--mut)">${m.qty} шт</span>
    </div>`).join('');

    const prevSearch=searchVal;
    $('modal').innerHTML=`
      <div class="mh"><div class="mt">📦 Прихід товару${draftId||curDraftId?' (чернетка)':''}</div><button class="bi" id="mx">${svg(ic.x,18)}</button></div>
      <div class="field"><label>Дата</label><input type="date" class="fi" id="rdate" value="${rDate}"/></div>
      <div class="field"><label>Примітка</label><input class="fi" id="rnote" placeholder="Постачальник..." value="${rNote}"/></div>
      ${rcvItems.length?`<div style="margin-bottom:10px">${itemsHtml}<div style="text-align:right;font-weight:700;font-size:14px;color:var(--sil)" data-grandtotal>Загалом: ${total.toFixed(2)} грн</div></div>`:''}
      <div style="font-size:12px;color:var(--mut);margin-bottom:6px">Оберіть товари:</div>
      <input class="fi" id="rsearch" style="margin-bottom:8px" placeholder="🔍 Пошук..." value="${prevSearch}"/>
      <div style="max-height:180px;overflow-y:auto;border:1px solid var(--brd);border-radius:8px;margin-bottom:14px">${listHtml||'<div style="padding:14px;color:var(--dim);text-align:center">Нічого не знайдено</div>'}</div>
      <div class="mf">
        <button class="btn bg" id="rcancel">Скасувати</button>
        <button class="btn bg" id="rdraft">📝 Чернетка</button>
        <button class="btn bp" id="rsave">Оприбуткувати (${rcvItems.length})</button>
      </div>`;

    $('mx').onclick=hide;$('rcancel').onclick=hide;
    const captureHeader=()=>{if($('rdate'))rDate=$('rdate').value;if($('rnote'))rNote=$('rnote').value;};
    $('rdate').addEventListener('change',captureHeader);
    $('rnote').addEventListener('input',captureHeader);
    // Search WITHOUT re-rendering whole modal — just update list
    $('rsearch').addEventListener('input',e=>{
      const v=e.target.value;
      const fil3=mats.filter(m=>!v||m.name.toLowerCase().includes(v.toLowerCase()));
      document.querySelector('#modal [style*="max-height:180px"]').innerHTML=
        fil3.map(m=>`<div style="padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer;display:flex;justify-content:space-between" data-add="${m.id}">
          <span style="font-size:13px">${m.name}</span><span style="font-size:12px;color:var(--mut)">${m.qty} шт</span>
        </div>`).join('') || '<div style="padding:14px;color:var(--dim);text-align:center">Нічого не знайдено</div>';
      bindAddBtns();
    });
    // Don't auto-focus search to avoid keyboard issues
    function bindAddBtns(){
      $('modal').querySelectorAll('[data-add]').forEach(el2=>{
        el2.onclick=()=>{
          captureHeader();
          const m=mats.find(x=>x.id===el2.dataset.add);
          rcvItems.push({matId:el2.dataset.add,qty:1,price:m?.price||0,disc:0});
          render($('rsearch').value);
        };
      });
    }
    bindAddBtns();
    $('modal').querySelectorAll('[data-rem]').forEach(b=>b.onclick=()=>{captureHeader();rcvItems.splice(+b.dataset.rem,1);render($('rsearch')?.value||'');});
    function updateItemSum(idx){
      const it=rcvItems[idx];
      const dp2=(it.price||0)*(1-(it.disc||0)/100);
      const sumEl=$('modal').querySelector(`[data-sum="${idx}"]`);
      if(sumEl)sumEl.textContent=(it.qty*dp2).toFixed(2)+' грн (ціна зі знижкою: '+dp2.toFixed(2)+' грн/шт)';
      // Update grand total
      const total2=rcvItems.reduce((s,x)=>s+x.qty*(x.price||0)*(1-(x.disc||0)/100),0);
      const totalEl=$('modal').querySelector('[data-grandtotal]');
      if(totalEl)totalEl.textContent='Загалом: '+total2.toFixed(2)+' грн';
    }
    $('modal').querySelectorAll('[data-qty]').forEach(inp=>inp.addEventListener('input',()=>{rcvItems[+inp.dataset.qty].qty=+inp.value||0;updateItemSum(+inp.dataset.qty);}));
    $('modal').querySelectorAll('[data-price]').forEach(inp=>inp.addEventListener('input',()=>{rcvItems[+inp.dataset.price].price=+inp.value||0;updateItemSum(+inp.dataset.price);}));
    $('modal').querySelectorAll('[data-disc]').forEach(inp=>inp.addEventListener('input',()=>{rcvItems[+inp.dataset.disc].disc=+inp.value||0;updateItemSum(+inp.dataset.disc);}));
    $('rdraft').onclick=async()=>{
      captureHeader();
      if(rcvItems.length===0){alert('Додайте хоча б один товар, щоб зберегти чернетку');return;}
      const draftData={date:rDate,note:rNote,items:rcvItems,updatedAt:new Date().toISOString()};
      if(curDraftId)await updateDoc(doc(db,'drafts',curDraftId),draftData);
      else{const ref=await addDoc(collection(db,'drafts'),draftData);curDraftId=ref.id;}
      hide();
    };
    $('rsave').onclick=async()=>{
      captureHeader();
      if(rcvItems.length===0){alert('Додайте товари');return;}
      const date=rDate,note=rNote;
      // One shared id per "накладна" (invoice) — every item entered together
      // in this session carries it, so history can group them back into one
      // invoice card instead of one row per unit.
      const batchId='b'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
      for(const it of rcvItems){
        const m=mats.find(x=>x.id===it.matId);if(!m)continue;
        const dp=(it.price||0)*(1-(it.disc||0)/100),oldQ=m.qty||0,oldAvg=m.avgPrice||m.price||dp;
        const newQ=oldQ+it.qty,newAvg=(oldQ*oldAvg+it.qty*dp)/newQ,newPPU=m.volPerUnit>0?newAvg/m.volPerUnit:0;
        await updateDoc(doc(db,'materials',it.matId),{qty:newQ,avgPrice:newAvg,avgPricePerUnit:newPPU});
        await addDoc(collection(db,'purchases'),{matId:it.matId,matName:m.name,type:'receive',qty:it.qty,unit:'шт',price:dp,origPrice:it.price,disc:it.disc||0,total:it.qty*dp,date,note,batchId});
      }
      if(curDraftId)await deleteDoc(doc(db,'drafts',curDraftId));
      hide();
    };
  }
  show('');render();
}

  const rows=drafts.map(d=>{
    const total=(d.items||[]).reduce((s,it)=>s+it.qty*(it.price||0)*(1-(it.disc||0)/100),0);
    return`<div class="ri">
      <div class="rl"><div class="rn">${d.note||'Без примітки'}</div><div class="rs">${d.date||''} · ${(d.items||[]).length} поз. · ${total.toFixed(2)} грн</div></div>

        <button class="btn bp bs" data-resume="${d.id}">Продовжити</button>

      </div>

    ${drafts.length===0?'<div class="empty">Чернеток немає</div>':rows}`);
